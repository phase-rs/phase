[alias]
wasm = "build --package engine-wasm --target wasm32-unknown-unknown"
wasm-release = "build --package engine-wasm --target wasm32-unknown-unknown --release"
test-all = "test --all"
clippy-strict = "clippy --all-targets -- -D warnings"
export-cards = "run --release --bin card-data-export --"
export-json = "run --release --bin json-export --"
migrate-abilities = "run --release --bin migrate-abilities --"
serve = "run --release --bin phase-server"
coverage = "run --release --bin coverage-report -- data/"
coverage-all = "run --release --bin coverage-report -- data/ --all"
