name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-check:
    name: Rust (fmt, clippy, test, coverage-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: rust-debug

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude phase-tauri --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --exclude phase-tauri

      - name: Card support coverage gate
        run: cargo run --bin coverage-report -- data/ --ci

      - name: Cache MTGJSON data
        id: cache-mtgjson
        uses: actions/cache@v4
        with:
          path: data/mtgjson/AtomicCards.json
          key: mtgjson-atomic-v5

      - name: Download MTGJSON data
        if: steps.cache-mtgjson.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/mtgjson
          curl -L -o data/mtgjson/AtomicCards.json "https://mtgjson.com/api/v5/AtomicCards.json"

      - name: Verify card data is fresh
        if: steps.cache-mtgjson.outputs.cache-hit == 'true' || success()
        run: |
          cargo run --release --bin oracle-gen -- data/ > /tmp/card-data-check.json
          diff -q client/public/card-data.json /tmp/card-data-check.json || \
            (echo "::error::card-data.json is stale — run ./scripts/gen-card-data.sh and commit" && exit 1)

  rust-wasm:
    name: Rust (WASM build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown
          cache-shared-key: rust-wasm

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.114

      - name: Install binaryen
        run: sudo apt-get install -y binaryen

      - name: Build WASM (release)
        run: cargo build --package engine-wasm --target wasm32-unknown-unknown --release

      - name: Generate WASM bindings
        run: |
          wasm-bindgen \
            --target web \
            --out-dir wasm-out \
            target/wasm32-unknown-unknown/release/engine_wasm.wasm

      - name: Optimize WASM
        run: wasm-opt -Oz wasm-out/engine_wasm_bg.wasm -o wasm-out/engine_wasm_bg.wasm

      - name: Report WASM binary size
        run: |
          RAW_SIZE=$(stat -c%s wasm-out/engine_wasm_bg.wasm)
          RAW_KB=$(echo "scale=1; $RAW_SIZE / 1024" | bc)
          GZIP_SIZE=$(gzip -c wasm-out/engine_wasm_bg.wasm | wc -c)
          GZIP_KB=$(echo "scale=1; $GZIP_SIZE / 1024" | bc)
          echo "## WASM Binary Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Raw | ${RAW_KB} KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gzipped | ${GZIP_KB} KB |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: wasm-out/
          retention-days: 7

  frontend:
    name: Frontend (lint, type-check, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: cd client && pnpm install --frozen-lockfile

      - name: Lint
        run: cd client && pnpm run lint

      - name: Type check
        run: cd client && pnpm run type-check

      - name: Run tests with coverage
        run: cd client && pnpm test -- --run --coverage
