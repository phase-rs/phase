name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'client/**'
      - 'scripts/**'
      - 'Cargo.*'
      - '.cargo/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-check:
    name: Rust (fmt, clippy, test, coverage-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          cache-shared-key: rust-debug

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude phase-tauri --all-targets --features engine/proptest -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --exclude phase-tauri --features engine/proptest

      - name: Set cache keys
        id: cache-keys
        run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache MTGJSON data
        id: mtgjson-cache
        uses: actions/cache@v4
        with:
          path: data/mtgjson
          key: mtgjson-${{ steps.cache-keys.outputs.week }}
          restore-keys: mtgjson-

      - name: Download MTGJSON data
        if: steps.mtgjson-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/mtgjson
          curl -fSL -o data/mtgjson/AtomicCards.json "https://mtgjson.com/api/v5/AtomicCards.json"

      - name: Generate card data
        run: |
          cargo run --bin oracle-gen --features cli -- data/ --stats --names-out data/card-names.json > data/card-data.json

      - name: Card support coverage report
        run: |
          cargo run --bin coverage-report -- data/ --all > data/coverage-data.json
          jq '{total_cards, supported_cards, coverage_pct, coverage_by_format}' data/coverage-data.json > data/coverage-summary.json

      - name: Upload data to R2 (preview)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object put phase-rs-data/preview/card-data.json --file data/card-data.json --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          npx wrangler r2 object put phase-rs-data/preview/card-names.json --file data/card-names.json --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          npx wrangler r2 object put phase-rs-data/preview/coverage-data.json --file data/coverage-data.json --content-type application/json --cache-control "public, max-age=60, must-revalidate"
          npx wrangler r2 object put phase-rs-data/preview/coverage-summary.json --file data/coverage-summary.json --content-type application/json --cache-control "public, max-age=60, must-revalidate"

      - name: WASM compile check
        run: cargo check --package engine-wasm --target wasm32-unknown-unknown

  frontend:
    name: Frontend (lint, type-check, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: cd client && pnpm install --frozen-lockfile

      - name: Lint
        run: cd client && pnpm run lint

      - name: Type check
        run: cd client && pnpm run type-check

      - name: Run tests with coverage
        run: cd client && pnpm test -- --run --coverage
