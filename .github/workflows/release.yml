name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wasm:
    name: Build WASM + Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown
          cache-shared-key: rust-wasm

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.114

      - name: Install binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_123/binaryen-version_123-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_123/bin" >> $GITHUB_PATH

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Generate card data
        run: |
          mkdir -p data/mtgjson
          curl -L -o data/mtgjson/AtomicCards.json "https://mtgjson.com/api/v5/AtomicCards.json"
          cargo run --release --bin oracle-gen -- data/ --stats > client/public/card-data.json

      - name: Build WASM
        run: ./scripts/build-wasm.sh release

      - name: Build frontend
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 90

  deploy-production:
    name: Deploy Production (Cloudflare Pages)
    needs: [build-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=phase-rs --commit-dirty=true

  build-server:
    name: Build Server (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: rust-release

      - name: Build phase-server
        run: cargo build --release --bin phase-server

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: phase-server-linux
          path: target/release/phase-server
          retention-days: 90

  build-tauri:
    name: Build Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact: phase-tauri-linux
          - os: macos
            runner: macos-latest
            artifact: phase-tauri-macos
          - os: windows
            runner: windows-latest
            artifact: phase-tauri-windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.114

      - name: Install binaryen (Linux)
        if: matrix.os == 'linux'
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_123/binaryen-version_123-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_123/bin" >> $GITHUB_PATH

      - name: Install binaryen (macOS)
        if: matrix.os == 'macos'
        run: brew install binaryen

      - name: Install binaryen (Windows)
        if: matrix.os == 'windows'
        run: choco install binaryen
        shell: pwsh

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate card data
        run: |
          mkdir -p data/mtgjson
          curl -L -o data/mtgjson/AtomicCards.json "https://mtgjson.com/api/v5/AtomicCards.json"
          cargo run --release --bin oracle-gen -- data/ --stats > client/public/card-data.json
        shell: bash

      - name: Build WASM for Tauri
        run: ./scripts/build-wasm.sh release
        shell: bash

      - name: Install frontend dependencies
        run: cd client && pnpm install --frozen-lockfile

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client

      - name: Upload Tauri artifact (Linux)
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/appimage/*.AppImage
            client/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          retention-days: 90

      - name: Upload Tauri artifact (macOS)
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            client/src-tauri/target/release/bundle/dmg/*.dmg
            client/src-tauri/target/release/bundle/macos/*.app.tar.gz
            client/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 90

      - name: Upload Tauri artifact (Windows)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            client/src-tauri/target/release/bundle/nsis/*.exe
            client/src-tauri/target/release/bundle/nsis/*.nsis.zip
            client/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-wasm, build-server, build-tauri]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate updater manifest
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${GITHUB_REPOSITORY}"

          # Collect signatures
          LINUX_SIG=""
          MACOS_SIG=""
          WINDOWS_SIG=""

          if [ -f artifacts/phase-tauri-linux/*.AppImage.sig ]; then
            LINUX_SIG=$(cat artifacts/phase-tauri-linux/*.AppImage.sig)
          fi
          if [ -f artifacts/phase-tauri-macos/*.app.tar.gz.sig ]; then
            MACOS_SIG=$(cat artifacts/phase-tauri-macos/*.app.tar.gz.sig)
          fi
          if [ -f artifacts/phase-tauri-windows/*.nsis.zip.sig ]; then
            WINDOWS_SIG=$(cat artifacts/phase-tauri-windows/*.nsis.zip.sig)
          fi

          cat > artifacts/update.json << MANIFEST
          {
            "version": "${TAG}",
            "notes": "Release ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/phase_${TAG#v}_amd64.AppImage"
              },
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Phase.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/Phase_${TAG#v}_x64-setup.nsis.zip"
              }
            }
          }
          MANIFEST

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/phase-server-linux/phase-server
            artifacts/phase-tauri-linux/*.deb
            artifacts/phase-tauri-linux/*.AppImage
            artifacts/phase-tauri-macos/*.dmg
            artifacts/phase-tauri-macos/*.app.tar.gz
            artifacts/phase-tauri-windows/*.exe
            artifacts/update.json
