# Comprehensive Rules Section 717: Attraction Cards

[_meta]
section = 717
title = "Attraction Cards"

[cr_717_1]
rule = "717.1"
text = "Attraction is an artifact subtype seen only on nontraditional Magic cards. Each Attraction has an \"Astrotorium\" card back rather than a traditional Magic card back and has a column of circled numbers on the right side of its text box. Numbers in white text on a brightly colored background are said to be \"lit up\" on those cards. Note that multiple Attraction cards with the same English name may have different numbers lit up. You can see each Attraction card's possible combinations of lights at Gatherer.Wizards.com."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards (Unfinity) not implemented."

[cr_717_2]
rule = "717.2"
text = "Attraction cards do not begin the game in a player's deck and do not count toward maximum or minimum deck sizes. Rather, a player who chooses to play with Attraction cards begins the game with a supplementary Attraction deck that exists in the command zone. Each Attraction deck is shuffled before the game begins (see rule 103.3a)."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_2a]
rule = "717.2a"
text = "In constructed play, an Attraction deck must contain at least ten Attraction cards and each card in an Attraction deck must have a different English name."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_2b]
rule = "717.2b"
text = "In limited play, an Attraction deck must contain at least three Attraction cards from that player's card pool, and may contain multiple Attractions cards with the same English name."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_3]
rule = "717.3"
text = "Effects can cause an Attraction card to enter the battlefield from the command zone. See rule 701.51, \"Open an Attraction.\""
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_4]
rule = "717.4"
text = "As a player's precombat main phase begins, a player who controls one or more Attractions rolls to visit their Attractions. See rules 703.4g and 701.52, \"Roll to Visit Your Attractions.\" This turn-based action doesn't use the stack."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_5]
rule = "717.5"
text = "Each Attraction card has an ability that begins with the word \"Visit\" followed by a long dash in its rules text. This is a visit ability. A visit ability triggers whenever you roll to visit your Attractions and the result matches one of the lit-up numbers. See rule 702.159, \"Visit.\""
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_6]
rule = "717.6"
text = "If a card with an Astrotorium card back would be put into a zone other than the battlefield, exile, or the command zone from anywhere, instead its owner puts it into the command zone. This replacement effect may apply more than once to the same event. This is an exception to rule 614.5."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."

[cr_717_6a]
rule = "717.6a"
text = "Each card owned by the same player that has been put in the command zone this way is kept in a single face-up pile separate from any player's Attraction deck. This pile is informally referred to as that player's \"junkyard.\" The pile is not its own zone."
status = "missing"
impl_files = []
test_files = []
notes = "Attraction cards not implemented."
