[cr_712_6]
rule = "712.6"
text = "Players who are allowed to look at a double-faced card may look at both sides of that card."
status = "partial"
impl_files = []
test_files = []
notes = "The engine stores both faces of a DFC (front face as active, back face in back_face). The WASM/server layer filters state per-player but does not currently expose a separate \"look at both sides\" path for DFCs in hidden zones."

[cr_712_7]
rule = "712.7"
text = "Players must ensure that double-faced cards in hidden zones are indistinguishable from other cards in the same zone. To do this, the owner of a double-faced card may use completely opaque card sleeves and/or a substitute card (see rule 713). Sanctioned tournaments have additional rules for playing with double-faced cards. See rule 100.6."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical play guidance about sleeves and substitute cards. Not applicable to a digital engine where hidden zones are enforced by state filtering."

[cr_712_8]
rule = "712.8"
text = "Each face of a double-faced card that isn't a meld card has its own set of characteristics. The front face of each meld card and the combined face formed by a meld pair each has its own set of characteristics."
status = "implemented"
impl_files = ["game/game_object.rs:115", "game/transform.rs:36"]
test_files = ["game/transform.rs:135"]
notes = "Each face's characteristics are stored separately (active face in the main game object fields, back face in the back_face field). transform_permanent swaps between them."

[cr_712_8a]
rule = "712.8a"
text = "While a double-faced card is outside the game or in a zone other than the battlefield or stack, it has only the characteristics of its front face."
status = "implemented"
impl_files = ["game/zones.rs:90", "game/zones.rs:235"]
test_files = ["game/transform.rs:185"]
notes = "When a transformed DFC moves to any zone other than the battlefield, move_to_zone resets to front-face characteristics (transformed = false). This correctly implements both the zone-change and out-of-game cases."

[cr_712_8b]
rule = "712.8b"
text = "A meld card on the stack has only the characteristics of its front face."
status = "partial"
impl_files = ["types/card.rs:71"]
test_files = []
notes = "CardLayout::Meld is recognized. Deck loading uses only the front face of meld cards. Meld gameplay is not implemented, but the front-face-only-on-stack behavior is a consequence of the general loading approach."

[cr_712_8c]
rule = "712.8c"
text = "Normally, a nonmodal double-faced spell has its front face up while on the stack and has only the characteristics of its front face. However, if an effect allows a player to cast a nonmodal double-faced card \"transformed\" or \"converted,\" the resulting spell will have its back face up and have only the characteristics of its back face. Its mana value is calculated using the mana cost of its front face."
status = "partial"
impl_files = ["game/effects/change_zone.rs:52", "game/effects/change_zone.rs:102"]
test_files = []
notes = "enter_transformed is threaded through the zone-change pipeline (change_zone.rs) so a DFC can enter the battlefield transformed. The front-face-default on the stack is implicit (objects have front-face characteristics by default). Mana value from front-face cost when back face is up is not explicitly implemented."

[cr_712_8d]
rule = "712.8d"
text = "While a double-faced permanent has its front face up, it has only the characteristics of its front face."
status = "implemented"
impl_files = ["game/transform.rs:43"]
test_files = ["game/transform.rs:135"]
notes = "A DFC with transformed = false uses the front-face characteristics stored in the primary game object fields."

[cr_712_8e]
rule = "712.8e"
text = "While a nonmodal double-faced permanent has its back face up, it has only the characteristics of its back face. However, its mana value is calculated using the mana cost of its front face. If a permanent is copying the back face of a nonmodal double-faced permanent (even if the object representing that copy is itself a double-faced permanent), the mana value of that permanent is 0. See rule 202.3b."
status = "partial"
impl_files = ["game/transform.rs:36"]
test_files = ["game/transform.rs:136"]
notes = "When transformed = true the back-face characteristics are active. However, mana value is computed from the current active mana_cost (the back face's), not the front face's cost as required. The 0-mana-value-for-copies-of-back-face rule is also not implemented."

[cr_712_8f]
rule = "712.8f"
text = "While a modal double-faced spell is on the stack or a modal double-faced permanent is on the battlefield, it has only the characteristics of the face that's up."
status = "partial"
impl_files = ["types/card.rs:73"]
test_files = []
notes = "CardLayout::Modal is recognized. MDFC back-face selection at cast time (choosing which face to cast) is not yet implemented — the engine only loads the front face of an MDFC into the game object."

[cr_712_8g]
rule = "712.8g"
text = "While the two cards of a meld pair are on the battlefield as a melded permanent, the object represented by those cards has only the characteristics of the combined back face, and its mana value is the sum of the mana values of its front faces. If a permanent is copying a melded permanent, the mana value of the copy is 0. See rule 202.3c."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_9]
rule = "712.9"
text = "Only permanents represented by double-faced tokens and double-faced cards that are not meld cards can transform or convert. (See rule 701.27, \"Transform,\" and rule 701.28, \"Convert.\") If a spell or ability instructs a player to transform or convert any permanent that isn't represented by a double-faced token or a double-faced card, nothing happens."
status = "implemented"
impl_files = ["game/transform.rs:31"]
test_files = ["game/transform.rs:206"]
notes = "transform_permanent returns an error if back_face is None, which is the case for non-DFC permanents. The non_dfc_cannot_transform test verifies this. Meld cards are not explicitly excluded but they also lack a back_face in the current implementation."

[cr_712_10]
rule = "712.10"
text = "If a spell or ability instructs a player to transform or convert a permanent, and the face that permanent would transform or convert into is an instant or sorcery card face, or is a double-faced token that was created with an instant or sorcery face, nothing happens."
status = "missing"
impl_files = []
test_files = []
notes = "No guard in transform_permanent checks whether the target back face is an instant or sorcery."

[cr_712_11]
rule = "712.11"
text = "A double-faced spell is cast with its front face up by default. See rule 601, \"Casting Spells.\""
status = "implemented"
impl_files = ["game/casting.rs:1"]
test_files = []
notes = "All spells are put on the stack with their current object characteristics, which default to the front face. No DFC-specific check is needed since front-face-by-default is the standard loading behavior."

[cr_712_11a]
rule = "712.11a"
text = "If a double-faced card or a copy of a double-faced card is cast as a spell \"transformed\" or \"converted,\" it's put on the stack with its back face up."
status = "missing"
impl_files = []
test_files = []
notes = "Casting a DFC transformed (e.g., some Innistrad cards) not implemented. The enter_transformed pipeline handles battlefield entry, but the stack phase for transformed casting is not covered."

[cr_712_11b]
rule = "712.11b"
text = "A player casting a modal double-faced card or a copy of a modal double-faced card as a spell chooses which face they are casting before putting it onto the stack."
status = "missing"
impl_files = []
test_files = []
notes = "MDFC face selection during casting not implemented. The engine does not currently present a face-choice prompt for MDFC cards."

[cr_712_11c]
rule = "712.11c"
text = "Only the face that will be face up on the stack is evaluated to determine if it can be cast. Only that face is considered to be put onto the stack."
status = "partial"
impl_files = ["game/casting.rs:1"]
test_files = []
notes = "The engine evaluates the currently-active face of an object for casting legality, which is correct for the front-face-default case. MDFC back-face casting (rule 712.11b) is not implemented."

[cr_712_11d]
rule = "712.11d"
text = "If an ability of a double-faced card's front face allows it to be cast \"transformed\" or \"converted,\" that ability is also considered when evaluating that spell to determine if it can be cast. This is an exception to 712.11c."
status = "missing"
impl_files = []
test_files = []
notes = "Cast-transformed abilities on the front face not implemented."

[cr_712_12]
rule = "712.12"
text = "A player playing a modal double-faced card or a copy of a modal double-faced card as a land chooses one of its faces that's a land before putting it onto the battlefield. It enters the battlefield with that face up. See rule 305, \"Lands.\""
status = "missing"
impl_files = []
test_files = []
notes = "MDFC land-face selection not implemented. Playing the back (land) face of an MDFC is not currently supported."

[cr_712_13]
rule = "712.13"
text = "By default, a resolving double-faced spell that becomes a permanent is put onto the battlefield with the same face up that was face up on the stack."
status = "partial"
impl_files = ["game/stack.rs:1"]
test_files = []
notes = "When a spell resolves, its characteristics come from the stack entry, which defaults to the front face. The correct same-face behavior falls out of the general resolution path. Explicit transformed-entry (rule 712.13a) is not fully covered."

[cr_712_13a]
rule = "712.13a"
text = "Some abilities may cause a double-faced spell with its front face up on the stack to enter the battlefield transformed or converted. If the back face of the card that represents that spell is an instant or sorcery face, or that spell is a copy of a double-faced card created with an instant or sorcery back face, it doesn't enter the battlefield, and is instead put into its owner's graveyard."
status = "partial"
impl_files = ["game/effects/change_zone.rs:102"]
test_files = []
notes = "The change_zone pipeline supports enter_transformed for battlefield entry. However, the instant/sorcery back-face guard (which causes the card to go to graveyard instead) is not implemented."

[cr_712_14]
rule = "712.14"
text = "A double-faced card put onto the battlefield from a zone other than the stack enters the battlefield with its front face up by default."
status = "implemented"
impl_files = ["game/zones.rs:90", "game/zones.rs:235", "game/trigger_matchers.rs:1337"]
test_files = ["game/transform.rs:185"]
notes = "Zone changes reset the transformed flag to false (front face up) when a DFC leaves the battlefield. Cards entering from non-stack zones therefore always enter with front face up by default."

[cr_712_14a]
rule = "712.14a"
text = "If a spell or ability puts a double-faced card onto the battlefield \"transformed\" or \"converted,\" it enters the battlefield with its back face up. If a player is instructed to put a card that isn't a double-faced card onto the battlefield transformed or converted, that card stays in its current zone."
status = "implemented"
impl_files = ["game/effects/change_zone.rs:52", "game/effects/change_zone.rs:102"]
test_files = []
notes = "enter_transformed is set on the ProposedEvent and applied after zone-change: if should_transform && back_face.is_some() && !transformed, transform_permanent is called. Non-DFC cards without a back_face are not transformed."

[cr_712_14b]
rule = "712.14b"
text = "If a player is instructed to put a modal double-faced card onto the battlefield and its front face isn't a permanent card, the card stays in its current zone."
status = "missing"
impl_files = []
test_files = []
notes = "MDFC-specific ETB restriction (front face must be a permanent) not implemented. The general instant/sorcery ETB guard (zones.rs) catches this for single-faced objects but is not MDFC-aware."

[cr_712_14c]
rule = "712.14c"
text = "If a meld card is being melded with its counterpart, those cards enter the battlefield as a single permanent with their back faces up."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_15]
rule = "712.15"
text = "If an effect allows a player to cast a double-faced card as a face-down creature spell, or if a double-faced card enters the battlefield face down, it will have the characteristics given to it by the rule or effect that caused it to be face down. That card remains hidden, using a face-down substitute card (see rule 713) and/or opaque sleeves. See rule 708, \"Face-Down Spells and Permanents.\""
status = "missing"
impl_files = []
test_files = []
notes = "Interaction between DFC and face-down mechanics not implemented. play_face_down and morph do not handle the DFC case."

[cr_712_15a]
rule = "712.15a"
text = "While face down, a double-faced permanent can't transform or convert. If it's turned face up, it will have its front face up."
status = "missing"
impl_files = []
test_files = []
notes = "No guard in transform_permanent prevents transformation of face-down permanents."

[cr_712_16]
rule = "712.16"
text = "Melded permanents and other double-faced permanents can't be turned face down. If a spell or ability tries to turn a double-faced permanent face down, nothing happens."
status = "missing"
impl_files = []
test_files = []
notes = "No guard in play_face_down prevents DFCs from being turned face down."

[cr_712_17]
rule = "712.17"
text = "A double-faced card that is exiled face down remains hidden, using a face-down substitute card and/or opaque sleeves. See rule 713, \"Substitute Cards.\""
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical play guidance about substitute cards and sleeves. The digital engine tracks hidden state via the face_down field and state filtering."

[cr_712_18]
rule = "712.18"
text = "When a double-faced permanent transforms or converts, it doesn't become a new object. Any effects that applied to that permanent will continue to apply to it."
status = "implemented"
impl_files = ["game/transform.rs:15"]
test_files = ["game/transform.rs:135"]
notes = "transform_permanent operates on the existing game object in place (same ObjectId). Counters, tapped state, attachments, and continuous effects tracked by ObjectId are preserved."

[cr_712_19]
rule = "712.19"
text = "If an effect instructs a player to choose a card name, the player may choose the name of either face of a double-faced card but not both. The player may choose the name of the combined back face of a meld pair."
status = "missing"
impl_files = []
test_files = []
notes = "Name-choice effects do not offer both faces of a DFC. The engine only exposes the active face name."

[cr_712_20]
rule = "712.20"
text = "If a double-faced card would have an \"As [this permanent] transforms . . .\" ability after it transforms or converts, that ability is applied while that permanent is transforming or converting, not afterward."
status = "missing"
impl_files = []
test_files = []
notes = "As-transforms abilities not implemented. transform_permanent applies the new characteristics but does not check for or trigger as-transforms abilities."

[cr_712_21]
rule = "712.21"
text = "If a melded permanent leaves the battlefield, one permanent leaves the battlefield and two cards are put into the appropriate zone."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_21a]
rule = "712.21a"
text = "If a melded permanent is put into its owner's graveyard or library, that player may arrange the two cards in any order. If it's put into its owner's library, that player doesn't reveal the order."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_21b]
rule = "712.21b"
text = "If a player exiles a melded permanent, that player determines the relative timestamp order of the two cards at that time. This is an exception to the procedure described in rule 613.7m."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_21c]
rule = "712.21c"
text = "If an effect can find the new object that a melded permanent becomes as it leaves the battlefield, it finds both cards. (See rule 400.7.) If that effect causes actions to be taken upon those cards, the same actions are taken upon each of them."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_21d]
rule = "712.21d"
text = "If multiple replacement effects could be applied to the event of a melded permanent leaving the battlefield or being put into the new zone, applying one of those replacement effects to one of the two cards affects both cards. If the melded permanent is a commander, it may be exempt from this rule; see rules 903.9b-c."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_21e]
rule = "712.21e"
text = "If an effect needs to know the number of objects that changed zones, a melded permanent among those objects counts as one object that moved. If the effect needs to know the number of cards that changed zones, that melded permanent counts as two cards that moved."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."
