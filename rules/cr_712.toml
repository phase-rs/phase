# Comprehensive Rules Section 712: Double-Faced Cards

[_meta]
section = 712
title = "Double-Faced Cards"

[cr_712_1]
rule = "712.1"
text = "A double-faced card has a Magic card face on one side and either a Magic card face or half of an oversized card face on the other. (It does not have a Magic card back.) There are three kinds of double-faced cards: nonmodal double-faced cards (previously called \"transforming double-faced cards\"), modal double-faced cards, and meld cards."
status = "implemented"
impl_files = ["types/card.rs:66", "game/game_object.rs:115", "game/game_object.rs:116"]
test_files = []
notes = "The engine models all three DFC kinds: CardLayout::Transform (nonmodal DFC), CardLayout::Modal (MDFC), and CardLayout::Meld. The game object has both a transformed boolean and a back_face field."

[cr_712_2]
rule = "712.2"
text = "Nonmodal double-faced cards have a Magic card face on each side and include abilities on one or both of their faces that allow the card to either \"transform\" or \"convert\" (turn over to its other face) and/or allow the card to be cast or enter the battlefield \"transformed\" or \"converted\" (with its back face up)."
status = "implemented"
impl_files = ["game/transform.rs:9", "game/effects/transform_effect.rs:6", "types/card.rs:70"]
test_files = ["game/transform.rs:135", "game/effects/transform_effect.rs:112"]
notes = "CardLayout::Transform models nonmodal DFCs. transform_permanent and the Transform effect handler implement the transform mechanic."

[cr_712_2a]
rule = "712.2a"
text = "A nonmodal double-faced card's front face is marked by a front-face symbol in its upper left corner. On cards printed starting with The Brothers' War\u2122 release, that symbol is a single white triangle pointed upward inside a black circle. Nonmodal double-faced cards printed in older sets have different front-face symbols. On Magic Origins\u2122 and Core Set 2019 double-faced cards, the front-face symbol is a modified Planeswalker icon. On cards in the Innistrad\u00ae block, Shadows over Innistrad set, and Innistrad: Midnight Hunt set, as well as on Ulrich of the Krallenhorde in the Eldritch Moon\u2122 set, the front-face symbol is a sun. On other Eldritch Moon double-faced cards, the front-face symbol is a full moon. On Ixalan\u00ae and Rivals of Ixalan\u2122 cards, the front-face symbol is a compass rose. On Kamigawa\u00ae: Neon Dynasty double-faced cards, the front-face symbol is a closed fan."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical card printing guidance for front-face symbols. Not applicable to a digital engine."

[cr_712_2b]
rule = "712.2b"
text = "A nonmodal double-faced card's back face is marked by a back-face symbol in its upper left or upper right corner. On cards printed starting with The Brothers' War release, that symbol is a single white triangle pointed downward inside a black circle. Nonmodal double-faced cards printed in older sets have different front-face symbols. On Magic Origins and Core Set 2019 double-faced cards, the back-face symbol is a full Planeswalker icon. On cards in the Innistrad block, Shadows over Innistrad set, and Innistrad: Midnight Hunt set, as well as on Ulrich, Uncontested Alpha in the Eldritch Moon set, the back-face symbol is a crescent moon. On other Eldritch Moon double-faced cards, the back-face symbol is a stylized image of Emrakul. On Ixalan and Rivals of Ixalan cards, the back-face symbol is a land icon. On Kamigawa: Neon Dynasty double-faced cards, the back-face symbol is an open fan."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical card printing guidance for back-face symbols. Not applicable to a digital engine."

[cr_712_2c]
rule = "712.2c"
text = "The front face of a nonmodal double-faced card whose back face is a creature has the back face's power and toughness printed in gray above the power and toughness box. This is reminder text and has no effect on game play."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical card reminder text. No engine logic needed."

[cr_712_3]
rule = "712.3"
text = "Modal double-faced cards have a Magic card face on each side. These faces are usually independent from one another, but they may have an ability that allows them to \"transform\" or \"convert\" on either face."
status = "implemented"
impl_files = ["types/card.rs:73", "database/synthesis.rs:92"]
test_files = []
notes = "CardLayout::Modal models MDFC cards in the type system and MTGJSON loading pipeline."

[cr_712_3a]
rule = "712.3a"
text = "A modal double-faced card's front face is marked by a front-face symbol in its upper left corner. The front-face symbol is a single black triangle inside a sideways teardrop."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical card printing guidance. Not applicable to a digital engine."

[cr_712_3b]
rule = "712.3b"
text = "A modal double-faced card's back face is marked by a back-face symbol in its upper left corner. The back-face symbol is two white triangles inside a sideways teardrop."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical card printing guidance. Not applicable to a digital engine."

[cr_712_3c]
rule = "712.3c"
text = "Each face of a modal double-faced card includes a hint bar in the lower left corner with information about the opposite face. This is reminder text and has no effect on game play."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical card reminder text. No engine logic needed."

[cr_712_4]
rule = "712.4"
text = "Meld cards have a Magic card face on one side and half of an oversized card face on the other."
status = "partial"
impl_files = ["types/card.rs:71", "database/synthesis.rs:90"]
test_files = []
notes = "CardLayout::Meld models meld card pairs in the type system. No active gameplay logic implements the meld mechanic."

[cr_712_4a]
rule = "712.4a"
text = "One card in each meld pair has an ability that exiles both that object and its counterpart and melds them. To meld the two cards in a meld pair, put them onto the battlefield with their back faces up and combined (see rule 701.42, \"Meld\"). The resulting permanent is a single object represented by two cards."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented. No meld ability parsing or two-card permanent representation exists."

[cr_712_4b]
rule = "712.4b"
text = "The back faces of a meld pair are used only to determine the characteristics of the melded permanent that pair becomes on the battlefield. If a rule or effect references the back face of a meld card when not part of a melded permanent on the battlefield, it fails to determine its characteristics, regardless of which parts of the melded permanent is represented on that card's back face."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented."

[cr_712_4c]
rule = "712.4c"
text = "Unlike other double-faced cards, meld cards cannot be transformed or converted. Any instructions to do so are ignored."
status = "missing"
impl_files = []
test_files = []
notes = "Meld mechanic not implemented. No guard exists in transform_permanent preventing transformation of meld cards."

