# Comprehensive Rules Section 614: Replacement Effects

[_meta]
section = 614
title = "Replacement Effects"

[cr_614_1]
rule = "614.1"
text = "Some continuous effects are replacement effects. Like prevention effects (see rule 615), replacement effects apply continuously as events happen—they aren't locked in ahead of time. Such effects watch for a particular event that would happen and completely or partially replace that event with a different event. They act like \"shields\" around whatever they're affecting."
status = "implemented"
impl_files = ["game/effects/change_zone.rs:64", "game/effects/change_zone.rs:112", "game/effects/counters.rs:12", "game/replacement.rs:19", "game/replacement.rs:720", "game/turns.rs:383", "parser/oracle_effect/sequence.rs:441", "parser/oracle_effect/sequence.rs:698", "parser/oracle_effect/types.rs:151", "types/ability.rs:1720", "types/replacements.rs:10"]
test_files = []
notes = ""

