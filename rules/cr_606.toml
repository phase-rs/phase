# Comprehensive Rules Section 606: Loyalty Abilities

[_meta]
section = 606
title = "Loyalty Abilities"

[cr_606_1]
rule = "606.1"
text = "Some activated abilities are loyalty abilities, which are subject to special rules."
status = "implemented"
impl_files = ["game/planeswalker.rs:16"]
test_files = []
notes = ""

[cr_606_2]
rule = "606.2"
text = "An activated ability with a loyalty symbol in its cost is a loyalty ability. Normally, only planeswalkers have loyalty abilities."
status = "implemented"
impl_files = ["game/planeswalker.rs:57"]
test_files = []
notes = ""

[cr_606_3]
rule = "606.3"
text = "A player may activate a loyalty ability of a permanent they control any time they have priority and the stack is empty during a main phase of their turn, but only if no player has previously activated a loyalty ability of that permanent that turn."
status = "implemented"
impl_files = ["game/engine.rs:305", "game/planeswalker.rs:14", "game/planeswalker.rs:38", "game/planeswalker.rs:43", "game/turns.rs:128"]
test_files = []
notes = ""

[cr_606_4]
rule = "606.4"
text = "The cost to activate a loyalty ability of a permanent is to put on or remove from that permanent a certain number of loyalty counters, as shown by the loyalty symbol in the ability's cost. This cost may be modified by other effects."
status = "implemented"
impl_files = ["game/planeswalker.rs:59", "game/planeswalker.rs:101"]
test_files = []
notes = ""

[cr_606_5]
rule = "606.5"
text = "If the total cost to activate a loyalty ability contains multiple costs to add or remove loyalty counters, those costs are combined into a single cost to add or remove loyalty counters, as appropriate."
status = "missing"
impl_files = []
test_files = []
notes = "Multiple loyalty counter cost combination not yet implemented. Edge case for unusual planeswalker designs."

[cr_606_6]
rule = "606.6"
text = "A loyalty ability with a negative loyalty cost, taking into account any additional costs, can't be activated unless the permanent has at least that many loyalty counters on it."
status = "implemented"
impl_files = ["game/planeswalker.rs:90"]
test_files = []
notes = ""
