test_files = []
notes = ""

[cr_702_19b]
rule = "702.19b"
text = "The controller of an attacking creature with trample first assigns damage to the creature(s) blocking it. Once all those blocking creatures are assigned lethal damage, any excess damage is assigned as its controller chooses among those blocking creatures and the player, planeswalker, or battle the creature is attacking. When checking for assigned lethal damage, take into account damage already marked on the creature and damage from other creatures that’s being assigned during the same combat damage step, but not any abilities or effects that might change the amount of damage that’s actually dealt. The attacking creature’s controller need not assign lethal damage to all those blocking creatures but in that case can’t assign any damage to the player or planeswalker it’s attacking."
status = "implemented"
impl_files = ["game/combat_damage.rs:374", "game/combat_damage.rs:415", "game/engine.rs:2688", "game/engine.rs:2695", "types/game_state.rs:610", "types/game_state.rs:650", "types/game_state.rs:655"]
test_files = []
notes = ""

[cr_702_19c]
