# Comprehensive Rules Section 702: Keyword Abilities

[_meta]
section = 702
title = "Keyword Abilities"

[cr_702_1]
rule = "702.1"
text = "Most abilities describe exactly what they do in the card’s rules text. Some, though, are very common or would require too much space to define on the card. In these cases, the object lists only the name of the ability as a “keyword”; sometimes reminder text summarizes the game rule."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Meta-rule describing keyword ability syntax; no engine logic needed."

[cr_702_1a]
rule = "702.1a"
text = "If an effect refers to a “[keyword ability] cost,” it refers only to the variable costs for that keyword."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Meta-rule about keyword cost references; no engine logic needed."

[cr_702_1b]
rule = "702.1b"
text = "An effect that grants an object a keyword ability may define a variable in that ability based on characteristics of that object or other information about the game state. For these abilities, the value of that variable is constantly reevaluated."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Meta-rule about dynamic variables in granted abilities; no engine logic needed."

[cr_702_1c]
rule = "702.1c"
text = "An effect may state that “the same is true for” a list of keyword abilities or similar. If one of those keyword abilities has variants or variables and the effect grants that keyword or counters of that keyword to one or more objects and/or players, it grants each appropriate variant and variable of that keyword."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Meta-rule about \"same is true for\" effect syntax; no engine logic needed."

[cr_702_1d]
rule = "702.1d"
text = "An effect may refer to an object “with [keyword ability]” or “that has [keyword ability].” This means the same thing as an object “with a [keyword ability] ability” or an object “that has a [keyword ability] ability.”"
status = "not-applicable"
impl_files = []
test_files = []
notes = "Meta-rule about \"with keyword\" phrasing equivalence; no engine logic needed."

