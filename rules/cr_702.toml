status = "missing"
impl_files = []
test_files = []
notes = "Aura detachment from protection not enforced via SBAs."

[cr_702_16d]
rule = "702.16d"
text = "A permanent with protection can’t be equipped by Equipment that have the stated quality or fortified by Fortifications that have the stated quality. Such Equipment or Fortifications become unattached from that permanent as a state-based action, but remain on the battlefield. (See rule 704, “State-Based Actions.”)"
status = "missing"
impl_files = []
test_files = []
notes = "Equipment/Fortification detachment from protection not enforced via SBAs."

