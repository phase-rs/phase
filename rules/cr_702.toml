rule = "702.16a"
text = "Protection is a static ability, written “Protection from [quality].” This quality is usually a color (as in “protection from black”) but can be any characteristic value or information. If the quality happens to be a card name, it is treated as such only if the protection ability specifies that the quality is a name. If the quality is a card type, subtype, or supertype, the ability applies to sources that are permanents with that card type, subtype, or supertype and to any sources not on the battlefield that are of that card type, subtype, or supertype. This is an exception to rule 109.2."
status = "implemented"
impl_files = ["game/keywords.rs:74", "parser/oracle_keyword.rs:81"]
test_files = []
notes = ""

[cr_702_16b]
rule = "702.16b"
text = "A permanent or player with protection can’t be targeted by spells with the stated quality and can’t be targeted by abilities from a source with the stated quality."
status = "implemented"
impl_files = ["game/effects/deal_damage.rs:72", "game/effects/deal_damage.rs:94", "game/keywords.rs:59", "game/targeting.rs:8", "game/targeting.rs:384", "game/targeting.rs:458"]
test_files = []
notes = ""

