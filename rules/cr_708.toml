# Comprehensive Rules Section 708: Face-Down Spells and Permanents

[_meta]
section = 708
title = "Face-Down Spells and Permanents"

[cr_708_1]
rule = "708.1"
text = "Some cards allow spells and permanents to be face down."
status = "implemented"
impl_files = ["game/morph.rs:36", "game/morph.rs:181"]
test_files = ["game/morph.rs:312"]
notes = "Face-down spells and permanents supported via Morph/Disguise (play_face_down) and Manifest (manifest_card) in game/morph.rs."

[cr_708_2]
rule = "708.2"
text = "Face-down spells and face-down permanents have no characteristics other than those listed by the ability or rules that allowed the spell or permanent to be face down. Any listed characteristics are the copiable values of that object's characteristics. (See rule 613, \"Interaction of Continuous Effects,\" and rule 707, \"Copying Objects.\")"
status = "implemented"
impl_files = ["game/morph.rs:66", "game/morph.rs:198"]
test_files = ["game/morph.rs:312"]
notes = "Face-down permanents are given empty/zero characteristic fields. All base_* fields are cleared, making the 2/2 creature with no abilities the copiable state."

[cr_708_2a]
rule = "708.2a"
text = "If a face-up permanent is turned face down by a spell or ability that doesn't list any characteristics for that object, it becomes a 2/2 face-down creature with no text, no name, no subtypes, and no mana cost. A permanent that enters the battlefield face down also has these characteristics unless otherwise specified by the effect that put it onto the battlefield face down or allowed it to be cast face down. These values are the copiable values of that object's characteristics."
status = "implemented"
impl_files = ["game/morph.rs:67", "game/morph.rs:198"]
test_files = ["game/morph.rs:312"]
notes = "play_face_down and manifest_card both apply the 2/2 creature with no name, no subtypes, no color, no abilities override. base_power/toughness set to Some(2)."

[cr_708_2b]
rule = "708.2b"
text = "A face-down permanent can't be turned face-down. If a spell or ability attempts to turn a face-down permanent face down, nothing happens and that effect doesn't change any of its characteristics or their copiable values."
status = "partial"
impl_files = ["game/morph.rs:120"]
test_files = []
notes = "turn_face_up returns an error if the permanent is not face_down, preventing double-face-down via that path. However, there is no explicit guard in play_face_down preventing a face-down permanent from being turned face down again by a different effect path."

[cr_708_3]
rule = "708.3"
text = "Objects that are put onto the battlefield face down are turned face down before they enter the battlefield, so the permanent's enters-the-battlefield abilities won't trigger (if triggered) or have any effect (if static)."
status = "implemented"
impl_files = ["game/morph.rs:62", "game/morph.rs:194"]
test_files = ["game/morph.rs:312"]
notes = "play_face_down and manifest_card override all characteristics (including clearing abilities) before calling move_to_zone, so ETB triggers fire against the blank 2/2 creature state."

[cr_708_4]
rule = "708.4"
text = "Objects that are cast face down are turned face down before they are put onto the stack, so effects that care about the characteristics of a spell will see only the face-down spell's characteristics. Any effects or prohibitions that would apply to casting an object with these characteristics (and not the face-up object's characteristics) are applied to casting this object. The permanent the spell becomes will be a face-down permanent."
status = "implemented"
impl_files = ["game/morph.rs:36", "game/casting.rs:1"]
test_files = []
notes = "Morph/Disguise spells are cast via play_face_down which clears characteristics before putting onto the stack, so effects checking spell characteristics see only the face-down state."

[cr_708_5]
rule = "708.5"
text = "At any time, you may look at a face-down spell you control on the stack or a face-down permanent you control (even if it's phased out). You can't look at face-down cards in any other zone or face-down spells or permanents controlled by another player."
status = "partial"
impl_files = []
test_files = []
notes = "The engine stores the original characteristics in back_face and controls visibility via filter_state_for_player in the WASM/server layers. The controller can see the true identity but opponents cannot. The specific \"at any time you may look\" rule is enforced implicitly by the state filtering rather than as an explicit action."

[cr_708_6]
rule = "708.6"
text = "If you control multiple face-down spells or face-down permanents, you must ensure at all times that your face-down spells and permanents can be easily differentiated from each other. This includes, but is not limited to, knowing what ability or rules caused the permanents to be face down, the order spells were cast, the order that face-down permanents entered the battlefield, which creature(s) attacked last turn, and any other differences between face-down spells or permanents. Common methods for distinguishing between face-down objects include using counters or dice to mark the different objects, or clearly placing those objects in order on the table."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Physical play guidance for distinguishing face-down objects. Not applicable to a digital engine where object identity is tracked automatically via ObjectId."

[cr_708_7]
rule = "708.7"
text = "The ability or rules that allow a permanent to be face down may also allow the permanent's controller to turn it face up. Spells normally can't be turned face up."
status = "implemented"
impl_files = ["game/morph.rs:103"]
test_files = ["game/morph.rs:335"]
notes = "turn_face_up validates that the back_face contains a morph/disguise keyword (or is a manifested creature) before allowing the action. Spells on the stack have no turn_face_up path."

[cr_708_8]
rule = "708.8"
text = "As a face-down permanent is turned face up, its copiable values revert to its normal copiable values. Any effects that have been applied to the face-down permanent still apply to the face-up permanent. Any abilities relating to the permanent entering the battlefield don't trigger and don't have any effect, because the permanent has already entered the battlefield."
status = "implemented"
impl_files = ["game/morph.rs:160", "game/morph.rs:163"]
test_files = ["game/morph.rs:335"]
notes = "turn_face_up calls apply_back_face_to_object to restore all base_* fields and marks layers_dirty. No ETB trigger is emitted. External layer effects continue to apply to the now-face-up permanent."

[cr_708_9]
rule = "708.9"
text = "If a face-down permanent or a face-down component of a merged permanent moves from the battlefield to any other zone, its owner must reveal it to all players as they move it. If a face-down spell moves from the stack to any zone other than the battlefield, its owner must reveal it to all players as they move it. If a player leaves the game, all face-down permanents, face-down components of merged permanents, and face-down spells owned by that player must be revealed to all players. At the end of each game, all face-down permanents, face-down components of merged permanents, and face-down spells must be revealed to all players."
status = "missing"
impl_files = []
test_files = []
notes = "Mandatory reveal of face-down objects when leaving the battlefield not implemented. The engine does not emit a reveal event nor expose the back_face to opponents during the zone-change."

[cr_708_10]
rule = "708.10"
text = "If a face-down permanent becomes a copy of another permanent, its copiable values become the copiable values of that permanent, as modified by its face-down status. Its characteristics therefore remain the same: the characteristics listed by the ability or rules that allowed it to be turned face down. However, if it is turned face up, its copiable values become the values it copied from the other permanent. See rule 707.3."
status = "missing"
impl_files = []
test_files = []
notes = "Interaction between face-down status and copy effects not handled. become_copy.rs does not check face_down status and would apply the copied characteristics directly."

[cr_708_11]
rule = "708.11"
text = "If a face-down permanent would have an \"As [this permanent] is turned face up . . .\" ability after it's turned face up, that ability is applied while that permanent is being turned face up, not afterward."
status = "missing"
impl_files = []
test_files = []
notes = "As-turned-face-up abilities not implemented. turn_face_up restores characteristics but does not check for or apply face-up triggered abilities during the turn-face-up action."

[cr_708_12]
rule = "708.12"
text = "If a spell or ability that instructs a player to reveal a face-down permanent needs information about the revealed object, it uses the characteristics of that object ignoring any continuous effects that may be applying to it."
status = "missing"
impl_files = []
test_files = []
notes = "Reveal of face-down permanents ignoring continuous effects not implemented. No reveal action path exists in the engine."
