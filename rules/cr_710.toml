# Comprehensive Rules Section 710: Flip Cards

[_meta]
section = 710
title = "Flip Cards"

[cr_710_1]
rule = "710.1"
text = "Flip cards have a two-part card frame on a single card. The text that appears right side up on the card defines the card's normal characteristics. Additional alternative characteristics appear upside down on the card. The back of a flip card is the normal Magic card back."
status = "implemented"
impl_files = ["types/ability.rs:1117"]
test_files = []
notes = "Flip card characteristics tracked in types."

[cr_710_1a]
rule = "710.1a"
text = "The top half of a flip card contains the card's normal name, text box, type line, power, and toughness. The text box usually contains an ability that causes the permanent to \"flip\" if certain conditions are met."
status = "implemented"
impl_files = ["types/ability.rs:1117"]
test_files = []
notes = "Normal characteristics of flip cards tracked."

[cr_710_1b]
rule = "710.1b"
text = "The bottom half of a flip card contains an alternative name, text box, type line, power, and toughness. These characteristics are used only if the permanent is on the battlefield and only if the permanent is flipped."
status = "implemented"
impl_files = ["types/ability.rs:1258"]
test_files = []
notes = "Alternative flip-side characteristics tracked and applied when the permanent is flipped."

[cr_710_1c]
rule = "710.1c"
text = "A flip card's color and mana cost don't change if the permanent is flipped. Also, any changes to it by external effects will still apply."
status = "missing"
impl_files = []
test_files = []
notes = "Color/mana cost invariance through flipping not explicitly verified."

[cr_710_2]
rule = "710.2"
text = "In every zone other than the battlefield, and also on the battlefield before the permanent flips, a flip card has only the normal characteristics of the card. Once a permanent is flipped, its normal name, text box, type line, power, and toughness don't apply and the alternative versions of those characteristics apply instead."
status = "implemented"
impl_files = ["game/quantity.rs:376", "types/ability.rs:1117", "types/player.rs:65"]
test_files = []
notes = ""

[cr_710_3]
rule = "710.3"
text = "You must ensure that it's clear at all times whether a permanent you control is flipped or not, both when it's untapped and when it's tapped. Common methods for distinguishing between flipped and unflipped permanents include using coins or dice to mark flipped objects."
status = "implemented"
impl_files = ["types/ability.rs:1258"]
test_files = []
notes = ""

[cr_710_4]
rule = "710.4"
text = "Flipping a permanent is a one-way process. Once a permanent is flipped, it's impossible for it to become unflipped. However, if a flipped permanent leaves the battlefield, it retains no memory of its status. See rule 110.5."
status = "missing"
impl_files = []
test_files = []
notes = "One-way flip constraint not explicitly enforced; status reset on zone change follows general rules."

[cr_710_5]
rule = "710.5"
text = "If an effect instructs a player to choose a card name and the player wants to choose a flip card's alternative name, the player may do so."
status = "missing"
impl_files = []
test_files = []
notes = "Choosing a flip card's alternative name not explicitly implemented."
