# Comprehensive Rules Section 611: Continuous Effects

[_meta]
section = 611
title = "Continuous Effects"

[cr_611_1]
rule = "611.1"
text = "A continuous effect modifies characteristics of objects, modifies control of objects, or affects players or the rules of the game, for a fixed or indefinite period."
status = "implemented"
impl_files = ["game/layers.rs:211", "types/ability.rs:3365", "types/layers.rs:1"]
test_files = []
notes = "ContinuousModification enum and Layer system implement continuous effects."

[cr_611_2]
rule = "611.2"
text = "A continuous effect may be generated by the resolution of a spell or ability."
status = "implemented"
impl_files = ["game/effects/pump.rs:1", "game/effects/animate.rs:1", "game/effects/gain_control.rs:1"]
test_files = []
notes = "Spell/ability resolution can create continuous effects via Pump, Animate, GainControl, etc."

[cr_611_2a]
rule = "611.2a"
text = "A continuous effect generated by the resolution of a spell or ability lasts as long as stated by the spell or ability creating it (such as \"until end of turn\"). If no duration is stated, it lasts until the end of the game."
status = "implemented"
impl_files = ["game/effects/pump.rs:11", "game/effects/pump.rs:74"]
test_files = []
notes = ""

[cr_611_2b]
rule = "611.2b"
text = "Some continuous effects generated by the resolution of a spell or ability have durations worded \"for as long as . . . .\" If the \"for as long as\" duration never starts, the effect does nothing. Similarly, if that duration ends before the moment the effect would first be applied and doesn't begin again during that spell or ability's resolution, the effect does nothing. It doesn't start and immediately stop again, and it doesn't last forever."
status = "implemented"
impl_files = ["game/effects/effect.rs:26", "game/layers.rs:184", "game/layers.rs:420", "parser/oracle_effect/mod.rs:466", "parser/oracle_effect/mod.rs:479", "parser/oracle_effect/mod.rs:3202", "parser/oracle_effect/mod.rs:3242", "parser/oracle_effect/mod.rs:3254", "parser/oracle_effect/mod.rs:6456", "parser/oracle_effect/sequence.rs:158", "parser/oracle_effect/sequence.rs:842", "parser/oracle_effect/subject.rs:429", "types/ability.rs:589", "types/ability.rs:1285"]
test_files = []
notes = ""

[cr_611_2c]
rule = "611.2c"
text = "If a continuous effect generated by the resolution of a spell or ability modifies the characteristics or changes the controller of any objects, the set of objects it affects is determined when that continuous effect begins. After that point, the set won't change. (Note that this works differently than a continuous effect from a static ability.) A continuous effect generated by the resolution of a spell or ability that doesn't modify the characteristics or change the controller of any objects modifies the rules of the game, so it can affect objects that weren't affected when that continuous effect began. If a single continuous effect has parts that modify the characteristics or changes the controller of any objects and other parts that don't, the set of objects each part applies to is determined independently."
status = "implemented"
impl_files = ["game/layers.rs:211", "game/effects/pump.rs:11", "game/effects/gain_control.rs:19"]
test_files = []
notes = "Transient effects capture the affected object set at creation time and apply to it thereafter."

[cr_611_2d]
rule = "611.2d"
text = "If a resolving spell or ability that creates a continuous effect contains a variable such as X, the value of that variable is determined only once, on resolution. See rule 608.2h."
status = "implemented"
impl_files = ["game/effects/pump.rs:74", "game/quantity.rs:1"]
test_files = []
notes = "X value resolved at effect creation and stored as fixed value in the continuous effect."

[cr_611_2e]
rule = "611.2e"
text = "If a resolving spell or ability both puts a nontoken permanent onto the battlefield and creates a continuous effect stating that the permanent \"is [characteristic],\" that it \"has [characteristic],\" or that it doesn't have a particular characteristic, that continuous effect applies simultaneously with the permanent entering the battlefield. This characteristic is usually a color or a creature type. If the continuous effect says the permanent \"becomes [characteristic]\" or \"gains [an ability],\" that effect applies after the permanent is on the battlefield."
status = "missing"
impl_files = []
test_files = []
notes = "Simultaneous enter+characteristic-change effect ordering not explicitly modeled."

[cr_611_2f]
rule = "611.2f"
text = "Some spells and abilities generate a continuous effect that modifies the characteristics of the next spell a player casts, the next spell that fulfills certain conditions a player casts during some duration, or similar. These effects do not begin immediately. Rather, they begin to apply at the time that player next puts an appropriate spell on the stack, and they apply to that spell. See rule 601.2a."
status = "implemented"
impl_files = ["game/casting.rs:405", "game/static_abilities.rs:168"]
test_files = []
notes = "Spell-characteristic-modifying effects apply at cast time via static ability evaluation in prepare_spell_cast()."

[cr_611_3]
rule = "611.3"
text = "A continuous effect may be generated by the static ability of an object."
status = "implemented"
impl_files = ["game/static_abilities.rs:1", "game/layers.rs:326"]
test_files = []
notes = "Static abilities generate continuous effects evaluated through the layer system."

[cr_611_3a]
rule = "611.3a"
text = "A continuous effect generated by a static ability isn't \"locked in\"; it applies at any given moment to whatever its text indicates."
status = "implemented"
impl_files = ["game/layers.rs:211", "game/static_abilities.rs:168"]
test_files = []
notes = "evaluate_layers() re-evaluates all static ability effects fresh each time the layers_dirty flag is set."

[cr_611_3b]
rule = "611.3b"
text = "The effect applies at all times that the permanent generating it is on the battlefield or the object generating it is in the appropriate zone."
status = "implemented"
impl_files = ["game/layers.rs:327", "game/static_abilities.rs:168"]
test_files = []
notes = "gather_active_continuous_effects() only includes effects from objects in the appropriate zones."

[cr_611_3c]
rule = "611.3c"
text = "Continuous effects that modify characteristics of permanents do so simultaneously with the permanent entering the battlefield. They don't wait until the permanent is on the battlefield and then change it. Because such effects apply as the permanent enters the battlefield, they are applied before determining whether the permanent will cause an ability to trigger when it enters the battlefield."
status = "implemented"
impl_files = ["game/zones.rs:46", "game/layers.rs:211"]
test_files = []
notes = "evaluate_layers() is called as part of zone transitions; ETB triggers fire after layers are applied."

[cr_611_3d]
rule = "611.3d"
text = "Continuous effects from static abilities may allow a player to play a land or cast a permanent spell, or may grant an ability to a permanent spell or card that allows it to be cast. If the effect also grants that object an ability that functions only on the battlefield, that ability lasts as long as stated by the effect granting that permission or ability. If no duration is stated, it lasts until the end of the game. This is an exception to rules 611.3a–b."
status = "implemented"
impl_files = ["game/effects/grant_permission.rs:1", "game/static_abilities.rs:168"]
test_files = []
notes = "GrantPermission effect and static ability casting permissions implement this."
