# Comprehensive Rules Section 729: Merging with Permanents (Mutate)

[_meta]
section = 729
title = "Merging with Permanents (Mutate)"

[cr_729_1]
rule = "729.1"
text = "One keyword causes an object to merge with a permanent. See rule 702.140, \"Mutate.\""
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging with permanents not implemented."

[cr_729_2]
rule = "729.2"
text = "To merge an object with a permanent, place that object on top of or under that permanent. That permanent becomes a merged permanent represented by the card or copy that represented that object in addition to any other components that were representing it."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2a]
rule = "729.2a"
text = "A merged permanent has only the characteristics of its topmost component, unless otherwise specified by the effect that caused them to merge. This is a copiable effect whose timestamp is the time the objects merged. (See rule 613.2.)"
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2b]
rule = "729.2b"
text = "As an object merges with a permanent, that object leaves its previous zone and becomes part of an object on the battlefield, but the resulting permanent isn't considered to have just entered the battlefield."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2c]
rule = "729.2c"
text = "Because a merged permanent is the same object that it was before, it hasn't just come under a player's control, any continuous effects that affected it continue to do so, and so on."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2d]
rule = "729.2d"
text = "If a merged permanent contains a token, the resulting permanent is a token only if the topmost component is a token."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2e]
rule = "729.2e"
text = "If a merged permanent contains face-up and face-down components, the permanent's status is determined by its topmost component. If a face-down permanent becomes a face-up permanent as a result of an object merging with it, other effects don't count it as being turned face up."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2f]
rule = "729.2f"
text = "If a merged permanent is turned face down, each face-up component that represents it is turned face down. If a face-down merged permanent is turned face up, each face-down component that represents it is turned face up."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2g]
rule = "729.2g"
text = "A face-down merged permanent that contains an instant or sorcery card can't be turned face up. If such a permanent would turn face up, its controller reveals it and leaves it face down. Abilities that trigger when a permanent is turned face up won't trigger."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2h]
rule = "729.2h"
text = "If a merged permanent contains a flip card (see rule 710), that component's alternative characteristics are used instead of its normal characteristics if the merged permanent is flipped."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2i]
rule = "729.2i"
text = "A merged permanent is not a double-faced permanent even if it contains one or more double-faced components. If a merged permanent contains one or more double-faced components that can transform (see rule 712), transforming or converting that permanent causes each of those double-faced components to turn so that its other face is up."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_2j]
rule = "729.2j"
text = "A face-up merged permanent that contains a double-faced component can't be turned face down."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_3]
rule = "729.3"
text = "If a merged permanent leaves the battlefield, one permanent leaves the battlefield and each of the individual components are put into the appropriate zone."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_3a]
rule = "729.3a"
text = "If a merged permanent is put into its owner's graveyard or library, that player may arrange the new objects in any order. If it's put into its owner's library, that player doesn't reveal the order."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_3b]
rule = "729.3b"
text = "If a player exiles a merged permanent, that player determines the relative timestamp order of the cards at that time. This is an exception to the procedure described in rule 613.7m."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_3c]
rule = "729.3c"
text = "If an effect can find the new object that a merged permanent becomes as it leaves the battlefield, it finds all of those objects. (See rule 400.7.) If that effect causes actions to be taken upon those objects, the same actions are taken upon each of them."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_3d]
rule = "729.3d"
text = "If multiple replacement effects could be applied to the event of a merged permanent leaving the battlefield or being put into the new zone, applying one of those replacement effects to the object applies it to all components of the object. If the merged permanent is a commander, it may be exempt from this rule; see rules 903.9b–c."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."

[cr_729_3e]
rule = "729.3e"
text = "If a replacement effect applies to a \"card\" being put into a zone without also including tokens, that effect applies to all components of the merged permanent if it's not a token, including components that are tokens. If the merged permanent is a token but some of its components are cards, the merged permanent and its token components are put into the appropriate zone, and the components that are cards are moved by the replacement effect."
status = "missing"
impl_files = []
test_files = []
notes = "Mutate/merging not implemented."
