[cr_111_11]
rule = "111.11"
text = "If an effect instructs a player to create a token by name, doesn't define any other characteristics for that token, and the name is not one of the types in the list of predefined tokens above, that player uses the card with that name in the Oracle card reference to determine the characteristics of that token."
status = "missing"
impl_files = []
test_files = []
notes = "Named non-predefined token creation from Oracle reference is not implemented."

[cr_111_12]
rule = "111.12"
text = "If an effect instructs a player to create a token that is a copy of a nonexistent object, no token is created (see rule 707, \"Copying Objects\"). This does not apply to an effect that would use the last known information of an object."
status = "implemented"
impl_files = ["game/effects/token_copy.rs:1"]
test_files = []
notes = "token_copy.rs checks object existence before creating a copy token."

[cr_111_13]
rule = "111.13"
text = "A copy of a permanent spell becomes a token as it resolves. The token has the characteristics of the spell that became that token. The token is not \"created\" for the purposes of any replacement effects or triggered abilities that refer to creating a token."
status = "partial"
impl_files = ["game/effects/copy_spell.rs:1"]
test_files = []
notes = "Copy-spell-to-token logic exists. The distinction that it is not 'created' for trigger/replacement purposes is partially handled."
