# Comprehensive Rules Section 111: Tokens

[_meta]
section = 111
title = "Tokens"

[cr_111_1]
rule = "111.1"
text = "Some effects put tokens onto the battlefield. A token is a marker used to represent any permanent that isn't represented by a card."
status = "implemented"
impl_files = ["game/effects/token.rs:420", "game/game_object.rs:216", "types/triggers.rs:136"]
test_files = []
notes = "is_token flag on GameObject marks tokens. Tokens are created by the CreateToken effect handler."

[cr_111_2]
rule = "111.2"
text = "The player who creates a token is its owner. The token enters the battlefield under that player's control."
status = "implemented"
impl_files = ["game/effects/token.rs:300", "parser/oracle_effect/imperative.rs:1263"]
test_files = []
notes = "Token creation sets owner and controller to the creating player."

[cr_111_3]
rule = "111.3"
text = "The spell or ability that creates a token may define the values of any number of characteristics for the token. This becomes the token's \"text.\" The characteristic values defined this way are functionally equivalent to the characteristic values that are printed on a card; for example, they define the token's copiable values. A token doesn't have any characteristics not defined by the spell or ability that created it."
status = "implemented"
impl_files = ["game/effects/token.rs:420"]
test_files = []
notes = "Token definitions in CreateToken explicitly set all characteristics (P/T, types, color, abilities). Unspecified characteristics default to none/empty."

[cr_111_4]
rule = "111.4"
text = "A spell or ability that creates a token sets both its name and its subtype(s). If the spell or ability doesn't specify the name of the token, its name is the same as its subtype(s) plus the word \"Token.\" Once a token is on the battlefield, changing its name doesn't change its subtype(s), and vice versa."
status = "implemented"
impl_files = ["game/effects/token.rs:420"]
test_files = []
notes = "Token names are derived from subtypes when not specified. The name and subtype fields are independent."

[cr_111_5]
rule = "111.5"
text = "If a spell or ability would create a token, but a rule or effect states that a permanent with one or more of that token's characteristics can't enter the battlefield, the token is not created. Similarly, if an effect would create a token that is a copy of an instant or sorcery card, no token is created."
status = "partial"
impl_files = ["game/effects/change_zone.rs:75"]
test_files = []
notes = "CantEnterBattlefield effects can prevent token creation. The instant/sorcery copy restriction is not explicitly checked in token creation."

[cr_111_6]
rule = "111.6"
text = "A token is subject to anything that affects permanents in general or that affects the token's card type or subtype. A token isn't a card (even if represented by a card that has a Magic back or that came from a Magic booster pack)."
status = "implemented"
impl_files = ["game/game_object.rs:216"]
test_files = []
notes = "is_token distinguishes tokens from cards. Tokens are still permanents subject to all permanent-affecting rules."

[cr_111_7]
rule = "111.7"
text = "A token that's in a zone other than the battlefield ceases to exist. This is a state-based action; see rule 704. (Note that if a token changes zones, applicable triggered abilities will trigger before the token ceases to exist.)"
status = "implemented"
impl_files = ["game/sba.rs:121", "game/sba.rs:581"]
test_files = ["game/sba.rs:1449", "game/sba.rs:1478"]
notes = "check_token_cease_to_exist() SBA removes tokens from non-battlefield zones. Tokens on the stack are excluded (rule 704.5d exception)."

[cr_111_8]
rule = "111.8"
text = "A token that has left the battlefield can't move to another zone or come back onto the battlefield. If such a token would change zones, it remains in its current zone instead. It ceases to exist the next time state-based actions are checked; see rule 704."
status = "implemented"
impl_files = ["game/sba.rs:581"]
test_files = ["game/sba.rs:1449"]
notes = "Once a token is in a non-battlefield zone, check_token_cease_to_exist() removes it at SBA check time."

[cr_111_9]
rule = "111.9"
text = "Some effects instruct a player to create a legendary token. These may be written \"create [name], a . . .\" and list characteristics for the token. This is the same as an instruction to create a token with the listed characteristics that has the given name."
status = "implemented"
impl_files = ["game/effects/token.rs:420"]
test_files = []
notes = "Named legendary tokens are supported. The 'legendary' supertype and name are set in the token definition."

[cr_111_10]
rule = "111.10"
text = "Some effects instruct a player to create a predefined token. These effects use the definition below to determine the characteristics the token is created with. The effect that creates a predefined token may also modify or add to the predefined characteristics."
status = "implemented"
impl_files = ["game/effects/token.rs:734"]
test_files = []
notes = "predefined_token_abilities() in token.rs maps predefined token subtypes to their ability definitions."

