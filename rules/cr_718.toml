# Comprehensive Rules Section 718: Prototype Cards

[_meta]
section = 718
title = "Prototype Cards"

[cr_718_1]
rule = "718.1"
text = "Prototype cards have a two-part frame, with a smaller frame inset below the type line of the card. The inset frame contains the prototype keyword ability as well as a second set of power, toughness, and mana cost characteristics."
status = "partial"
impl_files = ["types/keywords.rs:261"]
test_files = []
notes = "Prototype keyword parsed into Keyword::Prototype(ManaCost) but alternative P/T casting logic not implemented."

[cr_718_2]
rule = "718.2"
text = "The mana cost, power, and toughness in the inset frame represent alternative characteristics that the object may have while it is a spell or while it is a permanent on the battlefield. The card's normal characteristics appear as usual."
status = "partial"
impl_files = ["types/keywords.rs:261"]
test_files = []
notes = "Prototype keyword parsed but alternative P/T/cost characteristics not applied during casting or on battlefield."

[cr_718_2a]
rule = "718.2a"
text = "The existence and values of these alternative characteristics are part of the object's copiable values."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype alternative characteristics not tracked in copiable values."

[cr_718_3]
rule = "718.3"
text = "As a player casts a prototype card, the player chooses whether they cast the card normally or cast it as a prototyped spell using the prototype keyword ability (see rule 702.160, \"Prototype\")."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype casting choice not implemented."

[cr_718_3a]
rule = "718.3a"
text = "While casting a prototyped spell, use only its alternative power, toughness, and mana cost when evaluating those characteristics to see if it can be cast."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype alternative cost evaluation not implemented."

[cr_718_3b]
rule = "718.3b"
text = "Both a prototyped spell and the permanent it becomes have only its alternative set of power, toughness, and mana cost characteristics. If that mana cost includes one or more colored mana symbols, the spell and the permanent it becomes are also that color or colors (see rule 105.2)."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype color/P/T overrides not applied."

[cr_718_3c]
rule = "718.3c"
text = "If a prototyped spell is copied, the copy is also a prototyped spell. It has the alternative power, toughness, and mana cost characteristics of the spell and not the normal power, toughness, and mana cost characteristics of the card that represents the prototyped spell. Any rule or effect that refers to a prototyped spell refers to the copy as well."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype spell copying not implemented."

[cr_718_3d]
rule = "718.3d"
text = "If a permanent that was a prototyped spell is copied, the copy has the alternative power, toughness, and mana cost characteristics of the permanent and not the normal power and toughness characteristics of the card that represents that permanent. Any rule or effect that refers to a permanent that was a prototyped spell refers to the copy as well."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype permanent copying not implemented."

[cr_718_4]
rule = "718.4"
text = "In every zone except the stack or the battlefield, and while on the stack or the battlefield when not cast as a prototyped spell, a prototype card has only its normal characteristics."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype zone-based characteristic isolation not implemented."

[cr_718_5]
rule = "718.5"
text = "A prototype card's characteristics other than its power, toughness, and mana cost (and other than color) remain the same whether it was cast as a prototyped spell or cast normally."
status = "missing"
impl_files = []
test_files = []
notes = "Prototype characteristic override scope not implemented."
