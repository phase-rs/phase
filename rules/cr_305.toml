# Comprehensive Rules Section 305: Lands

[_meta]
section = 305
title = "Lands"

[cr_305_1]
rule = "305.1"
text = "A player who has priority may play a land card from their hand during a main phase of their turn when the stack is empty. Playing a land is a special action; it doesn't use the stack (see rule 116). Rather, the player simply puts the land onto the battlefield. Since the land doesn't go on the stack, it is never a spell, and players can't respond to it with instants or activated abilities."
status = "implemented"
impl_files = ["ai_support/candidates.rs:750", "game/casting.rs:308", "game/casting.rs:347", "game/engine.rs:3247", "parser/oracle_effect/mod.rs:1499", "parser/oracle_static.rs:2728", "types/ability.rs:196", "types/ability.rs:202", "types/ability.rs:2039", "types/statics.rs:121", "types/triggers.rs:194"]
test_files = []
notes = ""

[cr_305_2]
rule = "305.2"
text = "A player can normally play one land during their turn; however, continuous effects may increase this number."
status = "implemented"
impl_files = ["game/engine.rs:235", "game/engine.rs:3228", "game/static_abilities.rs:121", "game/static_abilities.rs:430", "game/static_abilities.rs:449", "game/static_abilities.rs:824", "game/static_abilities.rs:854", "game/static_abilities.rs:897", "game/turns.rs:91", "parser/oracle_static.rs:693", "types/statics.rs:188"]
test_files = []
notes = ""

[cr_305_2a]
rule = "305.2a"
text = "To determine whether a player can play a land, compare the number of lands the player can play this turn with the number of lands they have already played this turn (including lands played as special actions and lands played during the resolution of spells and abilities). If the number of lands the player can play is greater, the play is legal."
status = "implemented"
impl_files = ["game/engine.rs:3228", "game/engine.rs:3233"]
test_files = ["game/engine.rs:3907"]
notes = "handle_play_land() computes effective_limit = max_lands_per_turn + additional_land_drops and compares against lands_played_this_turn."

[cr_305_2b]
rule = "305.2b"
text = "A player can't play a land, for any reason, if the number of lands the player can play this turn is equal to or less than the number of lands they have already played this turn. Ignore any part of an effect that instructs a player to do so."
status = "implemented"
impl_files = ["game/engine.rs:3233"]
test_files = ["game/engine.rs:3907"]
notes = "handle_play_land() returns EngineError::ActionNotAllowed when lands_played_this_turn >= effective_limit."

[cr_305_3]
rule = "305.3"
text = "A player can't play a land, for any reason, if it isn't their turn. Ignore any part of an effect that instructs a player to do so."
status = "implemented"
impl_files = ["game/engine.rs:3219"]
test_files = ["game/engine.rs:3883"]
notes = "handle_play_land() validates Phase::PreCombatMain or Phase::PostCombatMain before allowing a land play."

[cr_305_4]
rule = "305.4"
text = "Effects may also allow players to \"put\" lands onto the battlefield. This isn't the same as \"playing a land\" and doesn't count as a land played during the current turn."
status = "implemented"
impl_files = ["game/effects/change_zone.rs:1"]
test_files = []
notes = "ChangeZone effects can move lands to the battlefield without going through the PlayLand action path, so lands_played_this_turn is not incremented."

[cr_305_5]
rule = "305.5"
text = "Land subtypes are always a single word and are listed after a long dash. Land subtypes are also called land types. Lands may have multiple subtypes. See rule 205.3i for the complete list of land types."
status = "implemented"
impl_files = ["types/card_type.rs:113"]
test_files = []
notes = "Land subtypes stored as strings in CardType.subtypes. is_land_subtype() in card_type.rs lists all valid land subtypes."

[cr_305_6]
rule = "305.6"
text = "The basic land types are Plains, Island, Swamp, Mountain, and Forest. If an object uses the words \"basic land type,\" it's referring to one of these subtypes. An object with the land card type and a basic land type has the intrinsic ability \"{T}: Add [mana symbol],\" even if the text box doesn't actually contain that text or the object has no text box. For Plains, [mana symbol] is {W}; for Islands, {U}; for Swamps, {B}; for Mountains, {R}; and for Forests, {G}. See rule 107.4a. See also rule 605, \"Mana Abilities.\""
status = "implemented"
impl_files = ["game/effects/choose.rs:135", "game/layers.rs:706", "game/mana_payment.rs:355", "game/mana_payment.rs:357", "game/quantity.rs:332", "types/ability.rs:70", "types/ability.rs:92", "types/ability.rs:1086", "types/ability.rs:3701"]
test_files = []
notes = ""

[cr_305_7]
rule = "305.7"
text = "If an effect sets a land's subtype to one or more of the basic land types, the land no longer has its old land type. It loses all abilities generated from its rules text, its old land types, and any copiable effects affecting that land, and it gains the appropriate mana ability for each new basic land type. Note that this doesn't remove any abilities that were granted to the land by other effects. Setting a land's subtype doesn't add or remove any card types (such as creature) or supertypes (such as basic, legendary, and snow) the land may have. If a land gains one or more land types in addition to its own, it keeps its land types and rules text, and it gains the new land types and mana abilities."
status = "implemented"
impl_files = ["game/layers.rs:706", "game/layers.rs:768", "game/layers.rs:2221", "game/layers.rs:2371", "game/layers.rs:2391", "game/layers.rs:2449", "game/replacement.rs:1021", "parser/oracle.rs:1221", "parser/oracle_effect/subject.rs:433", "parser/oracle_effect/subject.rs:482", "parser/oracle_replacement.rs:411", "parser/oracle_static.rs:141", "parser/oracle_static.rs:159", "parser/oracle_static.rs:278", "parser/oracle_static.rs:2931", "parser/oracle_static.rs:2972", "parser/oracle_static.rs:5238", "types/ability.rs:3701", "types/ability.rs:3729"]
test_files = []
notes = ""

[cr_305_8]
rule = "305.8"
text = "Any land with the supertype \"basic\" is a basic land. Any land that doesn't have this supertype is a nonbasic land, even if it has a basic land type."
status = "implemented"
impl_files = ["types/card_type.rs:8", "game/filter.rs:809"]
test_files = []
notes = "Supertype::Basic is the canonical check for basic land status. filter.rs uses HasSupertype {value: 'Basic'} for basic land filters."

[cr_305_9]
rule = "305.9"
text = "If an object is both a land and another card type, it can be played only as a land. It can't be cast as a spell."
status = "implemented"
impl_files = ["game/casting.rs:347"]
test_files = []
notes = "casting.rs checks for Land card type and routes land cards through PlayLand (special action), preventing them from being cast as spells."
