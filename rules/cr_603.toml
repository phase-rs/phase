[cr_603_7h]
rule = "603.7h"
text = "An activated or triggered ability may create a delayed triggered ability that triggers when the ability that created it has resolved a certain number of times in a turn. In that case, that delayed triggered ability is created only once, during the appropriate resolution of that ability."
status = "missing"
impl_files = []
test_files = []
notes = "Counted-resolution delayed triggers not yet modeled."

[cr_603_8]
rule = "603.8"
text = "Some triggered abilities trigger when a game state (such as a player controlling no permanents of a particular card type) is true, rather than triggering when an event occurs. These abilities trigger as soon as the game state matches the condition. They'll go onto the stack at the next available opportunity. These are called state triggers. (Note that state triggers aren't the same as state-based actions.) A state-triggered ability doesn't trigger again until the ability has resolved, has been countered, or has otherwise left the stack. Then, if the object with the ability is still in the same zone and the game state still matches its trigger condition, the ability will trigger again."
status = "missing"
impl_files = []
test_files = []
notes = "State triggers (triggers on continuous game state rather than events) not yet implemented."

[cr_603_9]
rule = "603.9"
text = "Some triggered abilities trigger specifically when a player loses the game. These abilities trigger when a player loses or leaves the game, regardless of the reason, unless that player leaves the game as the result of a draw. See rule 104.3."
status = "implemented"
impl_files = ["parser/oracle.rs:1192", "parser/oracle_static.rs:724"]
test_files = []
notes = ""

