[cr_603_7a]
rule = "603.7a"
text = "Delayed triggered abilities are created during the resolution of spells or abilities, as the result of a replacement effect being applied, or as a result of a static ability that allows a player to take an action. A delayed triggered ability won't trigger until it has actually been created, even if its trigger event occurred just beforehand. Other events that happen earlier may make the trigger event impossible."
status = "implemented"
impl_files = ["parser/oracle_effect/mod.rs:1977", "parser/oracle_effect/mod.rs:3332", "parser/oracle_effect/mod.rs:3364", "parser/oracle_effect/sequence.rs:156"]
test_files = []
notes = ""

[cr_603_7b]
rule = "603.7b"
text = "A delayed triggered ability will trigger only once—the next time its trigger event occurs—unless it has a stated duration, such as \"this turn.\" If its trigger event occurs more than once simultaneously and the ability doesn't have a stated duration, the controller of the delayed triggered ability chooses which event causes the ability to trigger."
status = "implemented"
impl_files = ["types/ability.rs:1009", "game/triggers.rs:648", "game/triggers.rs:713"]
test_files = []
notes = "DelayedTrigger.one_shot controls single-fire behavior. Duration-based triggers via Duration type."

[cr_603_7c]
rule = "603.7c"
text = "A delayed triggered ability that refers to a particular object still affects it even if the object changes characteristics. However, if that object is no longer in the zone it's expected to be in at the time the delayed triggered ability resolves, the ability won't affect it. (Note that if that object left that zone and then returned, it's a new object and thus won't be affected. See rule 400.7.)"
