# Comprehensive Rules Section 603: Handling Triggered Abilities

[_meta]
section = 603
title = "Handling Triggered Abilities"

[cr_603_1]
rule = "603.1"
text = "Triggered abilities have a trigger condition and an effect. They are written as \"[When/Whenever/At] [trigger condition or event], [effect]. [Instructions (if any).]\""
status = "implemented"
impl_files = ["types/triggers.rs:11", "types/triggers.rs:290"]
test_files = []
notes = ""

[cr_603_1a]
rule = "603.1a"
text = "A triggered ability may include instructions after its effects that limit what the ability may target or state that it can't be countered. This text is not part of the ability's effect. It functions while the ability is on the stack."
status = "missing"
impl_files = []
test_files = []
notes = "Instructions embedded after effect text (e.g. 'can't be countered') not explicitly separated in the ability model."

[cr_603_1b]
rule = "603.1b"
text = "A triggered ability may have more than one trigger condition, and an instruction that refers to whether \"all\" of those conditions have happened during a particular period. This refers to whether or not all of those conditions have occurred during that period, regardless of whether that ability has triggered based on those conditions."
status = "missing"
impl_files = []
test_files = []
notes = "Multi-condition 'all of the above happened' triggers not yet modeled."

[cr_603_2]
rule = "603.2"
text = "Whenever a game event or game state matches a triggered ability's trigger event, that ability automatically triggers. The ability doesn't do anything at this point."
status = "implemented"
impl_files = ["game/combat_damage.rs:26", "game/combat_damage.rs:39", "game/trigger_matchers.rs:645", "game/triggers.rs:822", "parser/oracle_trigger.rs:1995", "types/triggers.rs:12"]
test_files = []
notes = ""

[cr_603_2a]
rule = "603.2a"
text = "Because they aren't cast or activated, triggered abilities can trigger even when it isn't legal to cast spells and activate abilities. Effects that preclude abilities from being activated don't affect them."
status = "implemented"
impl_files = ["game/triggers.rs:822"]
test_files = []
notes = "check_and_collect_triggers() runs independently of priority and casting restrictions."

[cr_603_2b]
rule = "603.2b"
text = "When a phase or step begins, all abilities that trigger \"at the beginning of\" that phase or step trigger."
status = "implemented"
impl_files = ["types/triggers.rs:146", "types/triggers.rs:147", "types/triggers.rs:154"]
test_files = []
notes = ""

[cr_603_2c]
rule = "603.2c"
text = "An ability triggers only once each time its trigger event occurs. However, it can trigger repeatedly if one event contains multiple occurrences."
status = "implemented"
impl_files = ["game/triggers.rs:101", "game/triggers.rs:149", "parser/oracle_trigger.rs:492", "types/ability.rs:3249"]
test_files = []
notes = ""

[cr_603_2d]
rule = "603.2d"
text = "An ability may state that a triggered ability triggers additional times. In this case, rather than simply determining that such an ability has triggered, determine how many times it should trigger, then that ability triggers that many times. An effect that states that an ability triggers additional times doesn't invoke itself repeatedly and doesn't apply to other effects that affect how many times an ability triggers. An effect that states a triggered ability of an object triggers additional times refers only to triggered abilities that object has, not to any delayed or reflexive triggered abilities (see rule 603.7 and rule 603.12) that may be created by abilities the object has."
status = "implemented"
impl_files = ["game/triggers.rs:494", "game/triggers.rs:592", "game/triggers.rs:635"]
test_files = []
notes = ""

[cr_603_2e]
rule = "603.2e"
text = "Some trigger events use the word \"becomes\" (for example, \"becomes attached\" or \"becomes blocked\"). These trigger only at the time the named event happens—they don't trigger if that state already exists or retrigger if it persists. An ability that triggers when a permanent \"becomes tapped\" or \"becomes untapped\" doesn't trigger if the permanent enters the battlefield in that state."
status = "implemented"
impl_files = ["types/triggers.rs:23", "types/triggers.rs:75", "types/triggers.rs:104"]
test_files = []
notes = ""

[cr_603_2f]
rule = "603.2f"
text = "If a triggered ability's trigger condition is met, but the object with that triggered ability is at no time visible to all players, the ability does not trigger."
status = "missing"
impl_files = []
test_files = []
notes = "Hidden-zone visibility suppression of triggers not explicitly modeled."

[cr_603_2g]
rule = "603.2g"
text = "An ability triggers only if its trigger event actually occurs. An event that's prevented or replaced won't trigger anything."
status = "implemented"
impl_files = ["types/triggers.rs:51"]
test_files = []
notes = ""

[cr_603_2h]
rule = "603.2h"
text = "A triggered ability may have an instruction followed by \"Do this only once each turn.\" This ability triggers only if its source's controller has not yet taken the indicated action that turn."
status = "missing"
impl_files = []
test_files = []
notes = "Per-turn single-fire trigger tracking not yet implemented."

[cr_603_3]
rule = "603.3"
text = "Once an ability has triggered, its controller puts it on the stack as an object that's not a card the next time a player would receive priority. See rule 117, \"Timing and Priority.\" The ability becomes the topmost object on the stack. It has the text of the ability that created it, and no other characteristics. It remains on the stack until it's countered, it resolves, a rule causes it to be removed from the stack, or an effect moves it elsewhere."
status = "implemented"
impl_files = ["game/triggers.rs:569", "types/triggers.rs:13"]
test_files = []
notes = ""

[cr_603_3a]
rule = "603.3a"
text = "A triggered ability is controlled by the player who controlled its source at the time it triggered, unless it's a delayed triggered ability. To determine the controller of a delayed triggered ability, see rules 603.7d–f."
status = "implemented"
impl_files = ["game/triggers.rs:569", "types/game_state.rs:155"]
test_files = []
notes = "Trigger controller is captured at trigger time in check_and_collect_triggers(); delayed trigger controller stored in DelayedTrigger.controller."

[cr_603_3b]
rule = "603.3b"
text = "If multiple abilities have triggered since the last time a player received priority, the abilities are placed on the stack in a two-part process. First, each player, in APNAP order, puts each triggered ability they control with a trigger condition that isn't another ability triggering on the stack in any order they choose. (See rule 101.4.) Second, each player, in APNAP order, puts all remaining triggered abilities they control on the stack in any order they choose. Then the game once again checks for and performs state-based actions until none are performed, then abilities that triggered during this process go on the stack. This process repeats until no new state-based actions are performed and no abilities trigger. Then the appropriate player gets priority."
status = "implemented"
impl_files = ["game/triggers.rs:145", "game/triggers.rs:503", "game/triggers.rs:515", "game/triggers.rs:682"]
test_files = []
notes = ""

[cr_603_3c]
rule = "603.3c"
text = "If a triggered ability is modal, its controller announces the mode choice when putting the ability on the stack. If one of the modes would be illegal (due to an inability to choose legal targets, for example), that mode can't be chosen. If no mode is chosen, the ability is removed from the stack. (See rule 700.2.)"
status = "missing"
impl_files = []
test_files = []
notes = "Modal triggered abilities don't yet prompt for mode choice when placed on stack."

[cr_603_3d]
rule = "603.3d"
text = "The remainder of the process for putting a triggered ability on the stack is identical to the process for casting a spell listed in rules 601.2c–d. If a choice is required when the triggered ability goes on the stack but no legal choices can be made for it, or if a rule or a continuous effect otherwise makes the ability illegal, the ability is simply removed from the stack."
status = "implemented"
impl_files = ["game/triggers.rs:569", "game/ability_utils.rs:83"]
test_files = []
notes = "push_trigger_to_stack() follows the same target-selection pipeline as casting."

[cr_603_4]
rule = "603.4"
text = "A triggered ability may read \"When/Whenever/At [trigger event], if [condition], [effect].\" When the trigger event occurs, the ability checks whether the stated condition is true. The ability triggers only if it is; otherwise it does nothing. If the ability triggers, it checks the stated condition again as it resolves. If the condition isn't true at that time, the ability is removed from the stack and does nothing. Note that this mirrors the check for legal targets. This rule is referred to as the \"intervening 'if' clause\" rule. (The word \"if\" has only its normal English meaning anywhere else in the text of a card; this rule only applies to an \"if\" that immediately follows a trigger condition.)"
status = "implemented"
impl_files = ["game/casting_costs.rs:822", "game/effects/mod.rs:882", "game/effects/mod.rs:908", "game/stack.rs:27", "game/stack.rs:115", "game/trigger_matchers.rs:1008", "game/triggers.rs:948", "parser/oracle_effect/mod.rs:1908", "parser/oracle_effect/mod.rs:2769", "parser/oracle_effect/mod.rs:2938", "parser/oracle_effect/mod.rs:3007", "parser/oracle_trigger.rs:308", "parser/oracle_trigger.rs:318", "parser/oracle_trigger.rs:343", "types/ability.rs:3011", "types/ability.rs:3021", "types/ability.rs:3061", "types/ability.rs:3110"]
test_files = []
notes = ""

[cr_603_5]
rule = "603.5"
text = "Some triggered abilities' effects are optional (they contain \"may,\" as in \"At the beginning of your upkeep, you may draw a card\"). These abilities go on the stack when they trigger, regardless of whether their controller intends to exercise the ability's option or not. The choice is made when the ability resolves. Likewise, triggered abilities that have an effect \"unless\" something is true or a player chooses to do something will go on the stack normally; the \"unless\" part of the ability is dealt with when the ability resolves."
status = "implemented"
impl_files = ["game/effects/mod.rs:362", "game/triggers.rs:569", "types/ability.rs:34"]
test_files = []
notes = "Optional effects (MayChoose) are pushed to stack unconditionally; choice is made at resolution via WaitingFor::OptionalEffect."

[cr_603_6]
rule = "603.6"
text = "Trigger events that involve objects changing zones are called \"zone-change triggers.\" Many abilities with zone-change triggers attempt to do something to that object after it changes zones. During resolution, these abilities look for the object in the zone that it moved to. If the object is unable to be found in the zone it went to, the part of the ability attempting to do something to the object will fail to do anything. The ability could be unable to find the object because the object never entered the specified zone, because it left the zone before the ability resolved, or because it is in a zone that is hidden from a player, such as a library or an opponent's hand. (This rule applies even if the object leaves the zone and returns again before the ability resolves.) The most common zone-change triggers are enters-the-battlefield triggers and leaves-the-battlefield triggers."
status = "implemented"
impl_files = ["game/trigger_matchers.rs:473", "types/triggers.rs:18", "types/triggers.rs:21"]
test_files = []
notes = ""

[cr_603_6a]
rule = "603.6a"
text = "Enters-the-battlefield abilities trigger when a permanent enters the battlefield. These are written, \"When [this object] enters, . . . \" or \"Whenever a [type] enters, . . .\" Each time an event puts one or more permanents onto the battlefield, all permanents on the battlefield (including the newcomers) are checked for any enters-the-battlefield triggers that match the event."
status = "implemented"
impl_files = ["game/trigger_matchers.rs:610", "types/triggers.rs:19", "types/triggers.rs:294"]
test_files = []
notes = ""

[cr_603_6b]
rule = "603.6b"
text = "Continuous effects that modify characteristics of a permanent do so the moment the permanent is on the battlefield (and not before then). The permanent is never on the battlefield with its unmodified characteristics. Continuous effects don't apply before the permanent is on the battlefield, however (see rule 603.6d)."
status = "implemented"
impl_files = ["game/layers.rs:211", "game/zones.rs:46"]
test_files = []
notes = "evaluate_layers() runs after each zone change; ETB triggers fire after layers are applied."

[cr_603_6c]
rule = "603.6c"
text = "Leaves-the-battlefield abilities trigger when a permanent moves from the battlefield to another zone, or when a phased-in permanent leaves the game because its owner leaves the game. These are written as, but aren't limited to, \"When [this object] leaves the battlefield, . . .\" or \"Whenever [something] is put into a graveyard from the battlefield, . . . .\" (See also rule 603.10.) An ability that attempts to do something to the card that left the battlefield checks for it only in the first zone that it went to. An ability that triggers when a card is put into a certain zone \"from anywhere\" is never treated as a leaves-the-battlefield ability, even if an object is put into that zone from the battlefield."
status = "implemented"
impl_files = ["types/triggers.rs:25"]
test_files = []
notes = ""

[cr_603_6d]
rule = "603.6d"
text = "Some permanents have text that reads \"[This permanent] enters with . . . ,\" \"As [this permanent] enters . . . ,\" \"[This permanent] enters as . . . ,\" or \"[This permanent] enters tapped.\" Such text is a static ability—not a triggered ability—whose effect occurs as part of the event that puts the permanent onto the battlefield."
status = "implemented"
impl_files = ["game/trigger_matchers.rs:518"]
test_files = []
notes = ""

[cr_603_6e]
rule = "603.6e"
text = "Some Auras have triggered abilities that trigger on the enchanted permanent leaving the battlefield. These triggered abilities can find the new object that permanent card became in the zone it moved to; they can also find the new object the Aura card became in its owner's graveyard after state-based actions have been checked. See rule 400.7."
status = "missing"
impl_files = []
test_files = []
notes = "Aura LTB trigger cross-referencing the new object not explicitly implemented."

[cr_603_7]
rule = "603.7"
text = "An effect may create a delayed triggered ability that can do something at a later time. A delayed triggered ability will contain \"when,\" \"whenever,\" or \"at,\" although that word won't usually begin the ability."
status = "implemented"
impl_files = ["game/effects/delayed_trigger.rs:7", "game/effects/delayed_trigger.rs:33", "game/effects/mod.rs:263", "game/effects/mod.rs:554", "game/effects/mod.rs:633", "game/effects/token.rs:477", "game/engine.rs:2939", "game/filter.rs:124", "game/trigger_matchers.rs:449", "game/triggers.rs:648", "game/triggers.rs:713", "parser/oracle_effect/mod.rs:1799", "parser/oracle_effect/mod.rs:1810", "parser/oracle_effect/mod.rs:2089", "parser/oracle_effect/mod.rs:2113", "parser/oracle_target.rs:100", "types/ability.rs:656", "types/ability.rs:661", "types/ability.rs:1009", "types/ability.rs:2007", "types/game_state.rs:147", "types/game_state.rs:918", "types/game_state.rs:922", "types/identifiers.rs:13"]
test_files = []
