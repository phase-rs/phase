test_files = []
notes = ""

[cr_603_12a]
rule = "603.12a"
text = "Normally, if the trigger event or events occur multiple times during the resolution of the spell or ability that created it, the reflexive triggered ability will trigger once for each of those times. However, if a resolving spell or ability includes a choice to pay a cost \"any number of times\" and creates a triggered ability that triggers \"when [a player] pays [that cost] one or more times,\" paying that cost one or more times causes the reflexive triggered ability to trigger only once."
status = "missing"
impl_files = []
test_files = []
notes = "Multiple-fire vs single-fire reflexive trigger distinction not explicitly modeled."
