[cr_601_2e]
rule = "601.2e"
text = "The game checks to see if the proposed spell can legally be cast. If the proposed spell is illegal, the game returns to the moment before the casting of that spell was proposed (see rule 732, \"Handling Illegal Actions\")."
status = "implemented"
impl_files = ["game/casting.rs:364", "game/casting.rs:399", "game/casting.rs:405", "game/casting.rs:416", "game/restrictions.rs:19", "game/restrictions.rs:241"]
test_files = []
notes = "prepare_spell_cast() and can_cast_object_now() enforce all casting legality checks before committing to cast. EngineError returns to pre-cast state on failure."

[cr_601_2f]
rule = "601.2f"
text = "The player determines the total cost of the spell. Usually this is just the mana cost. Some spells have additional or alternative costs. Some effects may increase or reduce the cost to pay, or may provide other alternative costs. Costs may include paying mana, tapping permanents, sacrificing permanents, discarding cards, and so on. The total cost is the mana cost or alternative cost (as determined in rule 601.2b), plus all additional costs and cost increases, and minus all cost reductions. If multiple cost reductions apply, the player may apply them in any order. If the mana component of the total cost is reduced to nothing by cost reduction effects, it is considered to be {0}. It can't be reduced to less than {0}. Once the total cost is determined, any effects that directly affect the total cost are applied. Then the resulting total cost becomes \"locked in.\" If effects would change the total cost after this time, they have no effect."
status = "implemented"
impl_files = ["game/casting.rs:569", "game/casting.rs:583", "game/casting.rs:622", "game/casting.rs:631", "game/casting.rs:638", "game/casting.rs:675", "game/casting.rs:701", "game/casting.rs:1564", "game/casting.rs:1641", "game/casting.rs:1824", "game/casting.rs:1842", "game/casting_costs.rs:382", "game/casting_costs.rs:383", "game/casting_costs.rs:1280", "game/casting_costs.rs:1314", "game/casting_costs.rs:1339", "game/game_object.rs:228", "game/keywords.rs:273", "game/keywords.rs:274", "game/keywords.rs:352", "game/mana_payment.rs:218", "game/mana_payment.rs:220", "game/static_abilities.rs:50", "parser/oracle.rs:58", "parser/oracle.rs:132", "parser/oracle.rs:336", "parser/oracle.rs:745", "parser/oracle.rs:4061", "parser/oracle_cost.rs:366", "parser/oracle_static.rs:603", "parser/oracle_static.rs:634", "parser/oracle_static.rs:2782", "parser/oracle_static.rs:4793", "types/ability.rs:2726", "types/ability.rs:2801", "types/card.rs:54", "types/statics.rs:82", "types/statics.rs:89", "types/statics.rs:97"]
test_files = []
notes = ""

[cr_601_2g]
rule = "601.2g"
text = "If the total cost includes a mana payment, the player then has a chance to activate mana abilities (see rule 605, \"Mana Abilities\"). Mana abilities must be activated before costs are paid."
status = "implemented"
impl_files = ["game/casting.rs:1303", "game/casting.rs:1324", "game/casting_costs.rs:954", "game/engine.rs:1143", "types/game_state.rs:953"]
test_files = []
notes = "WaitingFor::ManaPayment state allows the player to tap lands/activate mana abilities before paying. auto_tap_mana_sources pre-fills the pool."

[cr_601_2h]
rule = "601.2h"
text = "The player pays the total cost. First, they pay all costs that don't involve random elements or moving objects from the library to a public zone, in any order. Then they pay all remaining costs in any order. Partial payments are not allowed. Unpayable costs can't be paid."
status = "implemented"
impl_files = ["game/casting_costs.rs:113", "game/mana_payment.rs:207", "game/mana_payment.rs:209", "game/mana_payment.rs:218"]
test_files = []
notes = ""

[cr_601_2i]
rule = "601.2i"
text = "Once the steps described in 601.2a–h are completed, effects that modify the characteristics of the spell as it's cast are applied, then the spell becomes cast. Any abilities that trigger when a spell is cast or put onto the stack trigger at this time. If the spell's controller had priority before casting it, they get priority."
status = "implemented"
impl_files = ["game/restrictions.rs:110", "types/triggers.rs:41", "types/triggers.rs:42"]
test_files = []
notes = ""

[cr_601_3]
rule = "601.3"
text = "A player can begin to cast a spell only if a rule or effect allows that player to cast it and no rule or effect prohibits that player from casting it."
status = "implemented"
impl_files = ["game/restrictions.rs:19", "game/restrictions.rs:241", "game/restrictions.rs:356", "game/restrictions.rs:401", "game/restrictions.rs:576", "parser/oracle_casting.rs:239"]
test_files = []
notes = ""

[cr_601_3a]
rule = "601.3a"
text = "If an effect prohibits a player from casting a spell with certain qualities, that player may consider any choices to be made during that spell's proposal that may cause those qualities to change. If any such choices could cause that effect to no longer prohibit that player from casting that spell, the player may begin to cast the spell, ignoring the effect."
status = "missing"
impl_files = []
test_files = []
notes = "Nuanced lookahead rule. The engine enforces prohibitions but does not model the lookahead exception."

[cr_601_3b]
rule = "601.3b"
text = "If an effect allows a player to cast a spell with certain qualities as though it had flash, that player may consider any choices to be made during that spell's proposal that may cause that spell's qualities to change. If any such choices could cause that effect to apply, that player may begin to cast that spell as though it had flash."
status = "implemented"
impl_files = ["game/restrictions.rs:28"]
test_files = []
notes = ""

[cr_601_3c]
rule = "601.3c"
text = "If an effect allows a player to cast a spell as though it had flash only if an alternative or additional cost is paid, that player may begin to cast that spell as though it had flash."
status = "implemented"
impl_files = ["game/restrictions.rs:60", "parser/oracle.rs:1209"]
test_files = []
notes = ""

[cr_601_3d]
rule = "601.3d"
text = "If a spell would have flash only if certain conditions are met, its controller may begin to cast that spell as though it had flash if those conditions are met."
status = "implemented"
impl_files = ["game/restrictions.rs:28", "game/restrictions.rs:60"]
test_files = []
notes = "Flash timing checks in restrictions.rs evaluate conditions at cast time. Covered by conditional flash permissions."

[cr_601_3e]
rule = "601.3e"
text = "Some rules and effects state that an alternative set of characteristics or a subset of characteristics are considered to determine if a card or copy of a card is legal to cast. These alternative characteristics replace the object's characteristics for this determination. Continuous effects that would apply to that object once it has those characteristics are also considered."
status = "missing"
impl_files = []
test_files = []
notes = "Edge case for morph/manifest face-down casting characteristic substitution during legality check."

[cr_601_3f]
rule = "601.3f"
text = "Some effects allow a player to cast a spell with certain qualities from among face-down cards in exile. A player may begin to cast such a spell only if they can look at the face-down card in exile."
status = "missing"
impl_files = []
test_files = []
notes = "Face-down exile casting not yet implemented."

[cr_601_4]
rule = "601.4"
text = "While announcing the choices of any modes, alternative costs, and/or additional costs as described in rule 601.2b, some options may be available to a player only if other choices are made that would normally be made later in that rule's instructions. In that case, the spell's controller may consider any other choices to be made in that step. If any such choices could allow them to choose a particular mode, alternative cost, or additional cost, they may do so."
status = "missing"
impl_files = []
test_files = []
notes = "Lookahead rule for interdependent announcement choices. Not explicitly modeled."

[cr_601_5]
rule = "601.5"
text = "If a player is no longer allowed to cast a spell after completing its proposal (see rules 601.2a–d), the casting of the spell is illegal and the game returns to the moment before the casting of that spell was proposed (see rule 732, \"Handling Illegal Actions\"). It doesn't matter if a rule or effect would make the casting of the spell illegal while determining and paying that spell's costs (see rules 601.2f–h) or any time after the spell has been cast."
status = "implemented"
impl_files = ["game/casting.rs:1810", "game/engine.rs:268"]
test_files = []
notes = "handle_cancel_cast() rolls back to pre-cast state. EngineError::ActionNotAllowed propagates illegal cast."

[cr_601_5a]
rule = "601.5a"
text = "Once a player has begun casting a spell that had flash because certain conditions were met or that could be cast as though it had flash because certain conditions were met (see 601.3d), they may continue to cast that spell as though it had flash even if those conditions stop being met."
status = "missing"
impl_files = []
test_files = []
notes = "Flash conditions are re-checked only at cast initiation; mid-cast condition changes not modeled explicitly."

[cr_601_6]
rule = "601.6"
text = "Some spells specify that one of their controller's opponents does something the controller would normally do while it's being cast, such as choose a mode or choose targets. In these cases, the opponent does so when the spell's controller normally would do so."
status = "missing"
impl_files = []
test_files = []
notes = "Opponent-makes-choices-during-cast not yet implemented."

[cr_601_6a]
rule = "601.6a"
text = "If there is more than one opponent who could make such a choice, the spell's controller decides which of those opponents will make the choice."
status = "missing"
impl_files = []
test_files = []
notes = "Depends on CR 601.6 implementation."

[cr_601_6b]
rule = "601.6b"
text = "If the spell instructs its controller and another player to do something at the same time as the spell is being cast, the spell's controller goes first, then the other player. This is an exception to rule 101.4."
status = "missing"
impl_files = []
test_files = []
notes = "Simultaneous-cast-announcement ordering not modeled."

[cr_601_7]
rule = "601.7"
text = "Casting a spell that alters costs won't affect spells and abilities that are already on the stack."
status = "implemented"
impl_files = ["game/casting.rs:593", "game/casting_costs.rs:1280"]
test_files = []
notes = "Cost modifiers are computed and locked-in per-cast via apply_battlefield_cost_modifiers(); existing stack entries are not retroactively affected."
