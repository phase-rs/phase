# Comprehensive Rules Section 601: Casting Spells

[_meta]
section = 601
title = "Casting Spells"

[cr_601_1]
rule = "601.1"
text = "Previously, the action of casting a spell, or casting a card as a spell, was referred to on cards as \"playing\" that spell or that card. Cards that were printed with that text have received errata in the Oracle card reference so they now refer to \"casting\" that spell or that card."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Errata/terminology rule only — no engine logic required. The engine uses 'cast' throughout."

[cr_601_1a]
rule = "601.1a"
text = "Some effects still refer to \"playing\" a card. \"Playing a card\" means playing that card as a land or casting that card as a spell, whichever is appropriate."
status = "implemented"
impl_files = ["types/ability.rs:196", "types/ability.rs:199"]
test_files = []
notes = "CardPlayMode enum distinguishes Cast vs Play. game/casting.rs:347 handles land play vs spell cast."

[cr_601_2]
rule = "601.2"
text = "To cast a spell is to take it from where it is (usually the hand), put it on the stack, and pay its costs, so that it will eventually resolve and have its effect. Casting a spell includes proposal of the spell (rules 601.2a–d) and determination and payment of costs (rules 601.2f–h). To cast a spell, a player follows the steps listed below, in order. A player must be legally allowed to cast the spell to begin this process (see rule 601.3). If a player is unable to comply with the requirements of a step listed below while performing that step, the casting of the spell is illegal; the game returns to the moment before the casting of that spell was proposed (see rule 732, \"Handling Illegal Actions\")."
status = "implemented"
impl_files = ["game/triggers.rs:953", "parser/oracle_trigger.rs:1785", "parser/oracle_trigger.rs:1940", "parser/oracle_trigger.rs:1948", "parser/oracle_trigger.rs:1957", "parser/oracle_trigger.rs:4519", "types/ability.rs:196", "types/ability.rs:199", "types/ability.rs:2039", "types/ability.rs:3114"]
test_files = []
notes = ""

[cr_601_2a]
rule = "601.2a"
text = "To propose the casting of a spell, a player first moves that card (or that copy of a card) from where it is to the stack. It becomes the topmost object on the stack. It has all the characteristics of the card (or the copy of a card) associated with it, and that player becomes its controller. Any continuous effects that modify the characteristics of the spell as you start casting it begin as it is put on the stack (see rule 611.2f). Any one-shot effects that cause the spell to gain abilities as you cast it apply as it is put on the stack (see rule 610.5). The spell remains on the stack until it resolves, it's countered, or a rule or effect moves it elsewhere."
status = "implemented"
impl_files = ["game/casting.rs:117", "game/casting.rs:137", "game/casting.rs:215", "game/casting.rs:228", "game/casting.rs:277", "game/casting.rs:378", "game/casting.rs:386", "game/casting_costs.rs:869", "game/effects/cast_from_zone.rs:10", "game/effects/cast_from_zone.rs:57", "parser/oracle.rs:1194", "parser/oracle_effect/mod.rs:1494", "parser/oracle_effect/mod.rs:1546", "parser/oracle_static.rs:44", "parser/oracle_static.rs:2728", "types/ability.rs:2032", "types/game_state.rs:812", "types/game_state.rs:993"]
test_files = []
notes = ""

[cr_601_2b]
rule = "601.2b"
text = "If the spell is modal, the player announces the mode choice (see rule 700.2). If the player wishes to splice any cards onto the spell (see rule 702.47), they reveal those cards in their hand. If the spell has alternative or additional costs that will be paid as it's being cast such as buyback or kicker costs (see rules 118.8 and 118.9), the player announces their intentions to pay any or all of those costs (see rule 601.2f). A player can't apply two alternative methods of casting or two alternative costs to a single spell. If the spell has a variable cost that will be paid as it's being cast (such as an {X} in its mana cost; see rule 107.3), the player announces the value of that variable. If the value of that variable is defined in the text of the spell by a choice that player would make later in the announcement or resolution of the spell, that player makes that choice at this time instead of that later time. If a cost that will be paid as the spell is being cast includes hybrid mana symbols, the player announces the nonhybrid equivalent cost they intend to pay. If a cost that will be paid as the spell is being cast includes Phyrexian mana symbols, the player announces whether they intend to pay 2 life or a corresponding colored mana cost for each of those symbols. Previously made choices (such as choosing to cast a spell with flashback from a graveyard or choosing to cast a creature with morph face down) may restrict the player's options when making these choices."
status = "implemented"
impl_files = ["game/casting_costs.rs:132", "game/casting_costs.rs:493", "game/casting_costs.rs:542", "game/casting_costs.rs:681", "game/engine.rs:416", "game/engine.rs:504", "types/game_state.rs:528", "types/game_state.rs:539", "types/game_state.rs:560"]
test_files = []
notes = ""

[cr_601_2c]
rule = "601.2c"
text = "The player announces their choice of an appropriate object or player for each target the spell requires. A spell may require some targets only if an alternative or additional cost (such as a kicker cost) or a particular mode was chosen for it; otherwise, the spell is cast as though it did not require those targets. Similarly, a spell may require alternative targets only if an alternative or additional cost was chosen for it. If the spell has a variable number of targets, the player announces how many targets they will choose before they announce those targets. In some cases, the number of targets will be defined by the spell's text. Once the number of targets the spell has is determined, that number doesn't change, even if the information used to determine the number of targets does. The same target can't be chosen multiple times for any one instance of the word \"target\" on the spell. However, if the spell uses the word \"target\" in multiple places, the same object or player can be chosen once for each instance of the word \"target\" (as long as it fits the targeting criteria). If any effects say that an object or player must be chosen as a target, the player chooses targets so that they obey the maximum possible number of such effects without violating any rules or effects that say that an object or player can't be chosen as a target. The chosen objects and/or players each become a target of that spell. (Any abilities that trigger when those objects and/or players become the target of a spell trigger at this point; they'll wait to be put on the stack until the spell has finished being cast.)"
status = "implemented"
impl_files = ["game/ability_utils.rs:83", "game/ability_utils.rs:176", "game/ability_utils.rs:305", "game/casting_costs.rs:383", "game/effects/cast_from_zone.rs:19", "game/effects/mod.rs:88", "game/engine.rs:2515", "game/engine.rs:2532", "game/engine.rs:2542", "game/filter.rs:352", "types/ability.rs:693", "types/ability.rs:2782", "types/game_state.rs:440"]
test_files = []
notes = ""

[cr_601_2d]
rule = "601.2d"
text = "If the spell requires the player to divide or distribute an effect (such as damage or counters) among one or more targets, the player announces the division. Each of these targets must receive at least one of whatever is being divided."
status = "implemented"
impl_files = ["ai_support/candidates.rs:646", "game/casting_costs.rs:367", "game/casting_targets.rs:146", "game/casting_targets.rs:307", "game/effects/counters.rs:101", "game/effects/deal_damage.rs:276", "game/engine.rs:1056", "game/engine.rs:1093", "game/engine.rs:2755", "game/engine.rs:2796", "parser/oracle_effect/mod.rs:392", "parser/oracle_effect/mod.rs:403", "parser/oracle_effect/mod.rs:2048", "parser/oracle_effect/mod.rs:3547", "parser/oracle_effect/mod.rs:3579", "parser/oracle_effect/mod.rs:3601", "parser/oracle_effect/mod.rs:3614", "parser/oracle_effect/mod.rs:3635", "parser/oracle_effect/mod.rs:3670", "parser/oracle_effect/types.rs:18", "parser/oracle_target.rs:465", "types/ability.rs:2785", "types/ability.rs:3799", "types/actions.rs:155", "types/game_state.rs:179", "types/game_state.rs:619", "types/game_state.rs:659", "types/game_state.rs:664"]
test_files = []
