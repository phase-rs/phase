# Comprehensive Rules Section 800: General (Multiplayer Rules)

[_meta]
section = 800
title = "General (Multiplayer Rules)"

[cr_800_1]
rule = "800.1"
text = "A multiplayer game is a game that begins with more than two players. This section contains additional optional rules that can be used for multiplayer play."
status = "implemented"
impl_files = ["game/engine.rs:1", "game/turns.rs:1"]
test_files = []
notes = "The engine supports multiplayer games with more than two players."

[cr_800_2]
rule = "800.2"
text = "These rules consist of a series of options that can be added to a multiplayer game and a number of variant styles of multiplayer play. A single game may use multiple options but only one variant."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Rule clarification about the structure of multiplayer rules; no engine logic needed."

[cr_800_3]
rule = "800.3"
text = "Many multiplayer Magic tournaments have additional rules not included here, including rules for deck construction. See the most current Magic: The Gathering Tournament Rules for more information. They can be found at WPN.wizards.com/en/rules-documents."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Tournament rules reference; not applicable to engine."

[cr_800_4]
rule = "800.4"
text = "Unlike two-player games, multiplayer games can continue after one or more players have left the game."
status = "implemented"
impl_files = ["game/elimination.rs:8", "game/elimination.rs:46", "game/engine.rs:2889", "game/priority.rs:22", "game/turns.rs:529"]
test_files = []
notes = "Multiplayer continuation after player elimination implemented in game/elimination.rs. Priority skips eliminated players (game/priority.rs:22). Turn advancement skips eliminated players via players::next_player."

[cr_800_4a]
rule = "800.4a"
text = "When a player leaves the game, all objects (see rule 109) owned by that player leave the game and any effects which give that player control of any objects or players end. Then, if that player controlled any objects on the stack not represented by cards, those objects cease to exist. Then, if there are any objects still controlled by that player, those objects are exiled. This is not a state-based action. It happens as soon as the player leaves the game. If the player who left the game had priority at the time they left, priority passes to the next player in turn order who's still in the game."
status = "implemented"
impl_files = ["game/elimination.rs:56", "game/elimination.rs:59"]
test_files = ["game/elimination.rs:244"]
notes = "elimination.rs:57 removes the player's stack objects; elimination.rs:60-75 exiles their battlefield permanents. Priority passing to the next living player is handled by priority.rs. Full test coverage in elimination.rs tests."

[cr_800_4b]
rule = "800.4b"
text = "If an object would change to the control of a player who has left the game, it doesn't. If a token would be created under the control of a player who has left the game, no token is created. If an object would be put onto the battlefield or onto the stack under the control of a player who has left the game, that object remains in its current zone. If a player would be controlled by a player who has left the game, they aren't."
status = "missing"
impl_files = []
test_files = []
notes = "Edge cases for targeting or affecting a player who has left are not explicitly guarded against in token creation, zone transitions, or gain-control effects."

[cr_800_4c]
rule = "800.4c"
text = "If an effect that gives a player still in the game control of an object ends, there is no other effect giving control of that object to another player in the game, and the player who controlled that object by default has left the game, the object is exiled. This is not a state-based action. It happens as soon as the control-changing effect ends."
status = "missing"
impl_files = []
test_files = []
notes = "Control-reverting-to-left-player exile not implemented."

[cr_800_4d]
rule = "800.4d"
text = "If an object that would be owned by a player who has left the game would be created in any zone, it isn't created. If a triggered ability that would be controlled by a player who has left the game would be put onto the stack, it isn't put on the stack."
status = "missing"
impl_files = []
test_files = []
notes = "Creation suppression for left-player-owned objects not implemented."

[cr_800_4e]
rule = "800.4e"
text = "If combat damage would be assigned to a player who has left the game, that damage isn't assigned."
status = "missing"
impl_files = []
test_files = []
notes = "Combat damage skipping for eliminated players not explicitly guarded in combat_damage.rs."

[cr_800_4f]
rule = "800.4f"
text = "If an object requires a player who has left the game to pay a cost or choose whether to pay a cost, that cost is not paid."
status = "missing"
impl_files = []
test_files = []
notes = "Cost non-payment for eliminated players not implemented."

[cr_800_4g]
rule = "800.4g"
text = "If an object requires a player who has left the game to make a choice other than whether to pay a cost, the controller of the object chooses another player to make that choice. If the original choice was to be made by an opponent of the controller of the object, that player chooses another opponent if possible."
status = "missing"
impl_files = []
test_files = []
notes = "Choice delegation when required player has left not implemented."

[cr_800_4h]
rule = "800.4h"
text = "If a rule requires a player who has left the game to make a choice, the next player in turn order makes that choice."
status = "missing"
impl_files = []
test_files = []
notes = "Rule-required choice delegation for left players not implemented."

[cr_800_4i]
rule = "800.4i"
text = "If an effect requires information about a specific player, the effect uses the current information about that player if they are still in the game; otherwise, the effect uses the last known information about that player before they left the game. If an effect requires information from the game about actions players have taken, the effect can find actions that were taken by a player who has left the game."
status = "missing"
impl_files = []
test_files = []
notes = "Last known information for eliminated players not tracked separately from current game state."

[cr_800_4j]
rule = "800.4j"
text = "If a player leaves the game during their turn, that turn continues to its completion without an active player. If the active player would receive priority, instead the next player in turn order receives priority, or the top object on the stack resolves, or the phase or step ends, whichever is appropriate."
status = "missing"
impl_files = []
test_files = []
notes = "Turn continuation without an active player after mid-turn elimination not implemented. The engine does not have a headless-active-player mode."

[cr_800_4k]
rule = "800.4k"
text = "If a player who has left the game would begin a turn, that turn doesn't begin."
status = "implemented"
impl_files = ["game/turns.rs:81", "game/players.rs:16"]
test_files = ["game/players.rs:156"]
notes = "start_next_turn advances active_player via players::next_player, which skips eliminated players. A player who has left can never become the active player. Test: next_player_skips_eliminated."

[cr_800_4m]
rule = "800.4m"
text = "When a player leaves the game, any continuous effects with durations that last until that player's next turn or until a specific point in that turn will last until that turn would have begun. They neither expire immediately nor last indefinitely."
status = "missing"
impl_files = []
test_files = []
notes = "Duration tracking for effects tied to an eliminated player's next turn is not implemented."

[cr_800_4n]
rule = "800.4n"
text = "When a player leaves the game, objects that player owns in the ante zone do not leave the game. This is an exception to rule 800.4a. See rule 407, \"Ante.\""
status = "not-applicable"
impl_files = []
test_files = []
notes = "Ante zone not implemented; ante is not a supported game mode."

[cr_800_4p]
rule = "800.4p"
text = "In a Planechase game, if the player designated as the planar controller would leave the game, instead the next player in turn order that wouldn't leave the game becomes the planar controller, then the old planar controller leaves the game. See rule 311.5."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Planechase variant not implemented."

[cr_800_5]
rule = "800.5"
text = "Unless a chosen variant or option prescribes otherwise, seating order is determined by any mutually agreeable method. For example, players could agree to remain where they were before the game began, roll dice to determine seating order, and so on."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Seating order is determined externally (lobby/server); no engine logic needed."

[cr_800_6]
rule = "800.6"
text = "In a multiplayer game, the first mulligan a player takes doesn't count toward the number of cards that player will put on the bottom of their library or the number of mulligans that player may take. Subsequent mulligans are counted toward these numbers as normal."
status = "implemented"
impl_files = ["game/mulligan.rs:1"]
test_files = []
notes = "Free first mulligan for multiplayer implemented in mulligan.rs."

[cr_800_7]
rule = "800.7"
text = "In a multiplayer game other than a Two-Headed Giant game, the starting player doesn't skip the draw step of their first turn. In a Two-Headed Giant game, the team who plays first skips the draw step of their first turn. See rule 103.8."
status = "implemented"
impl_files = ["game/turns.rs:303"]
test_files = []
notes = "Multiplayer starting player draw-step behavior implemented in turns.rs."
