# Comprehensive Rules Section 724: The Monarch

[_meta]
section = 724
title = "The Monarch"

[cr_724_1]
rule = "724.1"
text = "The monarch is a designation a player can have. There is no monarch in a game until an effect instructs a player to become the monarch."
status = "implemented"
impl_files = ["game/effects/become_monarch.rs:14"]
test_files = []
notes = ""

[cr_724_2]
rule = "724.2"
text = "There are two inherent triggered abilities associated with being the monarch. These triggered abilities have no source and are controlled by the player who was the monarch at the time the abilities triggered. This is an exception to rule 113.8. The full texts of these abilities are \"At the beginning of the monarch's end step, that player draws a card\" and \"Whenever a creature deals combat damage to the monarch, its controller becomes the monarch.\""
status = "implemented"
impl_files = ["game/triggers.rs:425", "game/triggers.rs:453"]
test_files = []
notes = "Both inherent monarch triggered abilities implemented as synthetic game-rule triggers in triggers.rs."

[cr_724_3]
rule = "724.3"
text = "Only one player can be the monarch at a time. As a player becomes the monarch, the current monarch ceases to be the monarch."
status = "implemented"
impl_files = ["game/effects/become_monarch.rs:7"]
test_files = []
notes = ""

[cr_724_4]
rule = "724.4"
text = "If the monarch leaves the game, the active player becomes the monarch at the same time as that player leaves the game. If the active player is leaving the game or if there is no active player, the next player in turn order who can become the monarch becomes the monarch. If no player still in the game can become the monarch, the game continues with no monarch."
status = "implemented"
impl_files = ["game/elimination.rs:79"]
test_files = []
notes = ""

[cr_724_5]
rule = "724.5"
text = "If the result of a continuous effect generated by a static ability is determined based on who is currently the monarch, but there is no monarch in the game as that effect begins to apply, that effect does nothing until a player becomes the monarch. See rule 613, \"Continuous Effects.\""
status = "missing"
impl_files = []
test_files = []
notes = "Static effects conditioned on the monarch when no monarch exists not explicitly handled."
