notes = "Supertype::Basic is checked to determine basic land status. search_library.rs pushes Supertype::Basic when searching for basic lands."

[cr_205_4d]
rule = "205.4d"
text = "Any permanent with the supertype \"legendary\" is subject to the state-based action for legendary permanents, also called the \"legend rule\" (see rule 704.5j)."
