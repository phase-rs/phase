# Comprehensive Rules Section 205: Type Line

[_meta]
section = 205
title = "Type Line"

[cr_205_1]
rule = "205.1"
text = "The type line is printed directly below the illustration. It contains the card's card type(s). It also contains the card's subtype(s) and supertype(s), if applicable."
status = "implemented"
impl_files = ["types/card_type.rs:106", "types/card.rs:21"]
test_files = []
notes = "CardType struct contains supertypes, core_types, and subtypes. CardFace.card_type stores the parsed type line."

[cr_205_1a]
rule = "205.1a"
text = "Some effects set an object's card type. In most such cases, the new card type(s) replaces any existing card types. However, an object with either the instant or sorcery card type retains that type. Counters, stickers, effects, and damage marked on the object remain with it, even if they are meaningless to the new card type. Similarly, when an effect sets one or more of an object's subtypes, the new subtype(s) replaces any existing subtypes from the appropriate set (creature types, land types, artifact types, enchantment types, planeswalker types, or spell types). If an object's card type is removed, the subtypes correlated with that card type will remain if they are also the subtypes of a card type the object currently has; otherwise, they are also removed for the entire time the object's card type is removed. Removing an object's subtype doesn't affect its card types at all."
status = "implemented"
impl_files = ["game/effects/animate.rs:75", "parser/oracle_effect/mod.rs:387", "parser/oracle_effect/mod.rs:540", "parser/oracle_effect/mod.rs:2010", "parser/oracle_effect/mod.rs:2824", "parser/oracle_static.rs:2343", "parser/oracle_static.rs:2403", "types/ability.rs:1866"]
test_files = []
notes = ""

[cr_205_1b]
rule = "205.1b"
text = "Some effects change an object's card type, supertype, or subtype but specify that the object retains a prior card type, supertype, or subtype. In such cases, all the object's prior card types, supertypes, and subtypes are retained. This rule applies to effects that use phrases such as \"in addition to its other types\" or that state that something is \"still a [type, supertype, or subtype].\" Some effects state that an object becomes an \"artifact creature\"; these effects also allow the object to retain all of its prior card types and subtypes. Some effects state that an object becomes a \"[creature type or types] artifact creature\"; these effects also allow the object to retain all of its prior card types and subtypes other than creature types, but replace any existing creature types."
status = "implemented"
impl_files = ["parser/oracle_effect/mod.rs:387", "parser/oracle_static.rs:2343", "types/ability.rs:1866"]
test_files = []
notes = "ContinuousModification::AddType adds to existing types (additive). ContinuousModification::SetCoreTypes replaces. Parser detects 'in addition to its other types' phrases."

[cr_205_2]
rule = "205.2"
text = "Card Types"
status = "implemented"
impl_files = ["types/card_type.rs:44"]
test_files = []
notes = "CoreType enum defines all card types. CardType struct holds Vec<CoreType>."

[cr_205_2a]
rule = "205.2a"
text = "The card types are artifact, battle, conspiracy, creature, dungeon, enchantment, instant, kindred, land, phenomenon, plane, planeswalker, scheme, sorcery, and vanguard. See section 3, \"Card Types.\""
status = "implemented"
impl_files = ["game/effects/choose.rs:137", "game/filter.rs:149", "types/card_type.rs:44"]
test_files = []
notes = ""

[cr_205_2b]
rule = "205.2b"
text = "Some objects have more than one card type (for example, an artifact creature). Such objects satisfy the criteria for any effect that applies to any of their card types."
status = "implemented"
impl_files = ["types/card_type.rs:109", "game/filter.rs:149"]
test_files = []
notes = "CardType.core_types is a Vec<CoreType>, allowing multiple card types. filter.rs checks obj.card_types.core_types.contains() which satisfies any-type matching."

[cr_205_2c]
rule = "205.2c"
text = "Tokens have card types even though they aren't cards. The same is true of copies of spells and copies of cards."
status = "implemented"
impl_files = ["game/effects/token.rs:1", "game/effects/become_copy.rs:1"]
test_files = []
notes = "Tokens are created as GameObjects with fully populated card_types. Copies via become_copy copy the card_types characteristic."

[cr_205_3]
rule = "205.3"
text = "Subtypes"
status = "implemented"
impl_files = ["game/filter.rs:173", "parser/oracle_effect/subject.rs:433", "parser/oracle_effect/subject.rs:482", "types/ability.rs:722", "types/ability.rs:931"]
test_files = []
notes = ""

[cr_205_3a]
rule = "205.3a"
text = "A card can have one or more subtypes printed on its type line."
status = "implemented"
impl_files = ["parser/oracle_target.rs:349", "parser/oracle_target.rs:372", "parser/oracle_target.rs:390", "parser/oracle_target.rs:484", "parser/oracle_target.rs:2073", "parser/oracle_target.rs:2575"]
test_files = []
notes = ""

[cr_205_3b]
rule = "205.3b"
text = "Subtypes of each card type except creature and plane are always single words and are listed after a long dash. Each word after the dash is a separate subtype. Subtypes of creature cards are one or two words and are listed after a long dash. Each word or two-word phrase, as listed in rule 205.3m, is a separate subtype. Objects other than planes may have multiple subtypes. Subtypes of planes are also listed after a long dash, but may be multiple words; all words after the dash are, collectively, a single subtype."
status = "implemented"
impl_files = ["types/card_type.rs:110", "database/synthesis.rs:1"]
test_files = []
notes = "CardType.subtypes is a Vec<String> parsed from MTGJSON type_line data. Each subtype is a separate string entry."

[cr_205_3c]
rule = "205.3c"
text = "If a card with multiple card types has one or more subtypes, each subtype is correlated to its appropriate card type."
status = "partial"
impl_files = ["game/layers.rs:768"]
test_files = []
notes = "layers.rs has is_land_subtype() to selectively remove land subtypes during SetBasicLandType without affecting creature subtypes. Full per-type subtype correlation is not broadly enforced."

[cr_205_3d]
rule = "205.3d"
text = "An object can't gain a subtype that doesn't correspond to one of that object's types."
status = "missing"
impl_files = []
test_files = []
notes = "No enforcement that added subtypes match the object's card types. Parser-level effects add subtypes without type validation."

[cr_205_3e]
rule = "205.3e"
text = "If an effect instructs a player to choose a subtype, that player must choose one, and only one, existing subtype, and the subtype must be for the appropriate card type. For example, the player can't choose a land type if an instruction requires choosing a creature type."
status = "implemented"
impl_files = ["game/effects/choose.rs:91", "game/effects/choose.rs:115", "game/effects/choose.rs:136"]
test_files = []
notes = "ChoiceType::CreatureType, BasicLandType, LandType present typed subtype lists. Each restricts choices to the appropriate subtype category."

[cr_205_3f]
rule = "205.3f"
text = "Many cards were printed with subtypes that are now obsolete. Many cards have retroactively received subtypes. Use the Oracle card reference to determine what a card's subtypes are. (See rule 108.1.)"
status = "implemented"
impl_files = ["database/synthesis.rs:1"]
test_files = []
notes = "Card data is sourced from MTGJSON which uses current Oracle data including retroactive errata. No obsolete subtypes are used."

[cr_205_3g]
rule = "205.3g"
text = "Artifacts have their own unique set of subtypes; these subtypes are called artifact types. The artifact types are Attraction (see rule 717), Blood, Bobblehead, Clue, Contraption, Equipment (see rule 301.5), Food, Fortification (see rule 301.6), Gold, Incubator, Infinity, Junk, Lander, Map, Mutagen, Powerstone, Spacecraft, Stone, Treasure, and Vehicle (see rule 301.7)."
status = "implemented"
impl_files = ["types/card_type.rs:1"]
test_files = []
notes = "Artifact subtypes are stored as strings in CardType.subtypes. Equipment, Vehicle, Food, Treasure, Clue, Blood etc. are checked by string comparison."

[cr_205_3h]
rule = "205.3h"
text = "Enchantments have their own unique set of subtypes; these subtypes are called enchantment types. The enchantment types are Aura (see rule 303.4), Background, Cartouche, Case (see rule 719), Class (see rule 716), Curse, Role (see rule 303.7), Room, Rune, Saga (see rule 714), Shard, and Shrine."
status = "implemented"
impl_files = ["types/card_type.rs:1", "game/printed_cards.rs:68", "game/printed_cards.rs:73"]
test_files = []
notes = "Enchantment subtypes stored as strings. Class, Saga, Case, and Aura/Role subtypes are all checked by string comparison in engine logic."

[cr_205_3i]
rule = "205.3i"
text = "Lands have their own unique set of subtypes; these subtypes are called land types. The land types are Cave, Desert, Forest, Gate, Island, Lair, Locus, Mine, Mountain, Plains, Planet, Power-Plant, Sphere, Swamp, Tower, Town, and Urza's. Of that list, Forest, Island, Mountain, Plains, and Swamp are the basic land types. See rule 305.6."
