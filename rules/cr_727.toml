# Comprehensive Rules Section 727: Rad Counters

[_meta]
section = 727
title = "Rad Counters"

[cr_727_1]
rule = "727.1"
text = "Rad counters are a kind of counter a player can have (see rule 122, \"Counters\"). There is an inherent triggered ability associated with rad counters. This ability has no source and is controlled by the active player. This is an exception to rule 113.8. The full text of this ability is \"At the beginning of each player's precombat main phase, if that player has one or more rad counters, that player mills a number of cards equal to the number of rad counters they have. For each nonland card milled this way, that player loses 1 life and removes one rad counter from themselves.\""
status = "missing"
impl_files = []
test_files = []
notes = "Rad counters (Unfinity set mechanic) not implemented. No player-level counter infrastructure for rad counters exists."

[cr_727_1a]
rule = "727.1a"
text = "A card that refers to life loss \"from radiation\" refers to life lost as a result of the triggered ability associated with rad counters."
status = "missing"
impl_files = []
test_files = []
notes = "Rad counters not implemented; \"from radiation\" life-loss tracking not implemented."
