[cr_701_67b]
rule = "701.67b"
text = "If a waterbend cost is part of the total cost to cast a spell or activate an ability (usually because the waterbend cost itself is an additional cost), the alternate method to pay for mana described in rule 701.67a may be used only to pay for the amount of generic mana in the waterbend cost, even if the total cost to cast that spell or activate that ability includes other generic mana components."
status = "missing"
impl_files = []
test_files = []
notes = "Generic-mana scoping for waterbend vs overall spell cost is not explicitly enforced."

[cr_701_67c]
rule = "701.67c"
text = "An ability that triggers whenever a player waterbends triggers whenever that player pays a waterbend cost, regardless of how they paid that cost."
status = "implemented"
impl_files = ["game/engine.rs:1276", "game/trigger_matchers.rs:1705", "game/trigger_matchers.rs:1712", "types/triggers.rs:303"]
test_files = []
notes = "GameEvent::Waterbend is emitted and matched by TriggerMode::Waterbend in trigger_matchers.rs."

