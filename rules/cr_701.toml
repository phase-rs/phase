# Comprehensive Rules Section 701: Keyword Actions

[_meta]
section = 701
title = "Keyword Actions"

[cr_701_1]
rule = "701.1"
text = "Most actions described in a card's rules text use the standard English definitions of the verbs within, but some specialized verbs are used whose meanings may not be clear. These \"keywords\" are game terms; sometimes reminder text summarizes their meanings."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Informational rule — no implementation required."

[cr_701_2]
rule = "701.2"
text = "Activate"
status = "implemented"
impl_files = ["game/engine.rs"]
test_files = []
notes = "Activate is the primary action handled by GameAction::ActivateAbility in the engine apply loop."

[cr_701_2a]
rule = "701.2a"
text = "To activate an activated ability is to put it onto the stack and pay its costs, so that it will eventually resolve and have its effect. Only an object's controller (or its owner, if it doesn't have a controller) can activate its activated ability unless the object specifically says otherwise. A player may activate an ability if they have priority. See rule 602, \"Activating Activated Abilities.\""
status = "implemented"
impl_files = ["game/engine.rs:271", "game/engine.rs:928", "game/engine.rs:1147", "game/casting.rs:739"]
test_files = []
notes = "Activation is guarded by priority check (WaitingFor::Priority) and controller check in the ActivateAbility arm of engine.rs."

[cr_701_3]
rule = "701.3"
text = "Attach"
status = "implemented"
impl_files = ["parser/oracle_effect/types.rs:249", "types/triggers.rs:197", "types/triggers.rs:198", "types/triggers.rs:200"]
test_files = []
notes = ""

[cr_701_3a]
rule = "701.3a"
text = "To attach an Aura, Equipment, or Fortification to an object or player means to take it from where it currently is and put it onto that object or player. If something is attached to a permanent on the battlefield, it's customary to place it so that it's physically touching the permanent. An Aura, Equipment, or Fortification can't be attached to an object or player it couldn't enchant, equip, or fortify, respectively."
status = "implemented"
impl_files = ["game/effects/attach.rs:6", "game/effects/attach.rs:38"]
test_files = []
notes = ""

[cr_701_3b]
rule = "701.3b"
text = "If an effect tries to attach an Aura, Equipment, or Fortification to an object or player it can't be attached to, the Aura, Equipment, or Fortification doesn't move. If an effect tries to attach an Aura, Equipment, or Fortification to the object or player it's already attached to, the effect does nothing. If an effect tries to attach an object that isn't an Aura, Equipment, or Fortification to another object or player, the effect does nothing and the first object doesn't move."
status = "implemented"
impl_files = ["game/effects/attach.rs:6"]
test_files = []
notes = ""

[cr_701_3c]
rule = "701.3c"
text = "Attaching an Aura, Equipment, or Fortification on the battlefield to a different object or player causes the Aura, Equipment, or Fortification to receive a new timestamp."
status = "implemented"
impl_files = ["game/effects/attach.rs:34"]
test_files = []
notes = ""

[cr_701_3d]
rule = "701.3d"
text = "To \"unattach\" an Equipment from a creature means to move it away from that creature so the Equipment is on the battlefield but is not equipping anything. It should no longer be physically touching any creature. If an Aura, Equipment, or Fortification that was attached to an object or player ceases to be attached to it, that counts as \"becoming unattached [from that object or player]\"; this includes if that Aura, Equipment, or Fortification leaves the battlefield, the object leaves the zone it was in, or that player leaves the game."
status = "implemented"
impl_files = ["game/sba.rs:409", "game/sba.rs:427", "game/trigger_matchers.rs:1216", "game/trigger_matchers.rs:1217"]
test_files = []
notes = "SBA unattaches equipment when the equipped permanent is illegal (CR 704.5n). TriggerMode::Unattach fires on becoming-unattached events."

[cr_701_4]
rule = "701.4"
text = "Behold"
status = "missing"
impl_files = []
test_files = []
notes = "Behold (Bloomburrow set keyword action) is not implemented. No parser recognition or WaitingFor state."

[cr_701_4a]
rule = "701.4a"
text = "\"Behold a [quality]\" means \"Reveal a [quality] card from your hand or choose a [quality] permanent you control on the battlefield.\""
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_4b]
rule = "701.4b"
text = "The phrase \"if a [quality] was beheld\" refers to whether or not the object had that quality at the time the player took that action, regardless of whether or not the revealed card or chosen permanent still has that quality as the spell or ability including that phrase resolves."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_5]
rule = "701.5"
text = "Cast"
status = "implemented"
impl_files = ["game/casting.rs", "game/engine.rs"]
test_files = []
notes = "Casting is the primary flow: WaitingFor::Priority → GameAction::CastSpell → casting.rs prepare_spell_cast."

[cr_701_5a]
rule = "701.5a"
text = "To cast a spell is to take it from the zone it's in (usually the hand), put it on the stack, and pay its costs, so that it will eventually resolve and have its effect. A player may cast a spell if they have priority. See rule 601, \"Casting Spells.\""
status = "implemented"
impl_files = ["parser/oracle_effect/mod.rs:975", "parser/oracle_effect/mod.rs:979"]
test_files = []
notes = ""

[cr_701_5b]
rule = "701.5b"
text = "To cast a card is to cast it as a spell."
status = "implemented"
impl_files = ["game/casting.rs"]
test_files = []
notes = "Implicit in the casting pipeline — cards are always cast as spells. No separate code path required."

[cr_701_6]
rule = "701.6"
text = "Counter"
status = "implemented"
impl_files = ["parser/oracle_effect/imperative.rs:1269", "game/effects/counter.rs"]
test_files = []
notes = ""

[cr_701_6a]
rule = "701.6a"
text = "To counter a spell or ability means to cancel it, removing it from the stack. It doesn't resolve and none of its effects occur. A countered spell is put into its owner's graveyard."
status = "implemented"
impl_files = ["game/effects/counter.rs:17", "game/effects/counter.rs:130", "game/effects/counter.rs:132"]
test_files = ["game/effects/counter.rs:265"]
notes = "counter.rs removes the spell from the stack and moves it to graveyard (CR 608.2b path). Abilities are removed from the stack without zone move."

[cr_701_6b]
rule = "701.6b"
text = "The player who cast a countered spell or activated a countered ability doesn't get a \"refund\" of any costs that were paid."
status = "implemented"
impl_files = ["game/effects/counter.rs"]
test_files = []
notes = "No cost-refund logic exists in counter resolution — costs already paid via the casting/activation pipeline are not returned."

[cr_701_7]
rule = "701.7"
text = "Create"
status = "implemented"
impl_files = ["game/effects/token.rs", "types/triggers.rs"]
test_files = []
notes = ""

[cr_701_7a]
rule = "701.7a"
text = "To create one or more tokens with certain characteristics, put the specified number of tokens with the specified characteristics onto the battlefield."
status = "implemented"
impl_files = ["game/effects/token.rs:299"]
test_files = []
notes = ""

[cr_701_7b]
rule = "701.7b"
text = "If a replacement effect applies to a token being created, that effect applies before considering any continuous effects that will modify the characteristics of that token. If a replacement effect applies to a token entering the battlefield, that effect applies after considering any continuous effects that will modify the characteristics of that token."
status = "implemented"
impl_files = ["game/effects/token.rs:375"]
test_files = []
notes = "CR 614.1a: token creation is proposed through the replacement pipeline (ProposedEvent::CreateToken) before the token enters the battlefield."

[cr_701_7c]
rule = "701.7c"
text = "Previously, an effect that created tokens instructed a player to \"put [those tokens] onto the battlefield.\" Cards that were printed with that text have received errata in the Oracle card reference so they now \"create\" those tokens."
status = "not-applicable"
impl_files = []
test_files = []
notes = "Historical errata note — no implementation required. Engine uses MTGJSON oracle text which has the errata applied."

[cr_701_8]
rule = "701.8"
text = "Destroy"
status = "implemented"
impl_files = ["game/effects/destroy.rs:119", "types/triggers.rs:92"]
test_files = []
notes = ""

[cr_701_8a]
rule = "701.8a"
text = "To destroy a permanent, move it from the battlefield to its owner's graveyard."
status = "implemented"
impl_files = ["game/effects/destroy.rs:13"]
test_files = []
notes = ""

[cr_701_8b]
rule = "701.8b"
text = "The only ways a permanent can be destroyed are as a result of an effect that uses the word \"destroy\" or as a result of the state-based actions that check for lethal damage (see rule 704.5g) or damage from a source with deathtouch (see rule 704.5h). If a permanent is put into its owner's graveyard for any other reason, it hasn't been \"destroyed.\""
status = "implemented"
impl_files = ["game/effects/destroy.rs:14"]
test_files = []
notes = ""

[cr_701_8c]
rule = "701.8c"
text = "A regeneration effect replaces a destruction event. See rule 701.19, \"Regenerate.\""
status = "implemented"
impl_files = ["game/replacement.rs:257", "game/replacement.rs:263"]
test_files = ["game/effects/destroy.rs:386"]
notes = "destroy_applier() in replacement.rs intercepts ProposedEvent::Destroy when a regeneration shield is present, taps the permanent and removes it from combat instead of destroying it."

[cr_701_9]
rule = "701.9"
text = "Discard"
status = "implemented"
impl_files = ["types/triggers.rs:111"]
test_files = []
notes = ""

[cr_701_9a]
rule = "701.9a"
text = "To discard a card, move it from its owner's hand to that player's graveyard."
status = "implemented"
impl_files = ["game/effects/discard.rs:15"]
test_files = []
notes = ""

[cr_701_9b]
rule = "701.9b"
text = "By default, effects that cause a player to discard a card allow the affected player to choose which card to discard. Some effects, however, require a random discard or allow another player to choose which card is discarded."
status = "implemented"
impl_files = ["game/effects/discard.rs:98"]
test_files = []
notes = ""

[cr_701_9c]
rule = "701.9c"
text = "If a card is discarded, but an effect causes it to be put into a hidden zone instead of into its owner's graveyard without being revealed, all values of that card's characteristics are considered to be undefined. If a card is discarded this way to pay a cost that specifies a characteristic about the discarded card, that cost payment is illegal; the game returns to the moment before the cost was paid (see rule 732, \"Handling Illegal Actions\")."
status = "missing"
impl_files = []
test_files = []
notes = "Hidden-zone discard (e.g., Leyline of the Void interaction) is not implemented. All discards move to the graveyard."

[cr_701_10]
rule = "701.10"
text = "Double"
status = "implemented"
impl_files = ["parser/oracle_effect/counter.rs:192", "parser/oracle_effect/imperative.rs:1232"]
test_files = []
notes = ""

[cr_701_10a]
rule = "701.10a"
text = "Doubling a creature's power and/or toughness creates a continuous effect. This effect modifies that creature's power and/or toughness but doesn't set those characteristics to a specific value. See rule 613.4c."
status = "implemented"
impl_files = ["game/effects/pump.rs:128", "game/effects/pump.rs:181", "types/ability.rs:370", "types/ability.rs:384", "types/ability.rs:1835", "types/ability.rs:1841", "types/ability.rs:2171"]
test_files = []
notes = ""

[cr_701_10b]
rule = "701.10b"
text = "To double a creature's power, that creature gets +X/+0, where X is that creature's power as the spell or ability that doubles its power resolves. Similarly, an effect that doubles a creature's toughness gives it +0/+X, where X is that creature's toughness. Doubling a creature's power and toughness gives it +X/+Y, where X is its power and Y is its toughness."
status = "implemented"
impl_files = ["game/effects/pump.rs:129", "game/effects/pump.rs:229"]
test_files = []
notes = ""

[cr_701_10c]
rule = "701.10c"
text = "If a creature's power is less than 0 when it's doubled, doubling that creature's power instead means that the creature gets -X/-0, where X is the difference between 0 and its power. Similarly, if its toughness is less than 0 when doubled, it gets -0/-X. If one characteristic's value is negative but the other isn't when both are doubled, it gets -X/+Y or +X/-Y, as appropriate."
status = "implemented"
impl_files = ["game/effects/pump.rs:131"]
test_files = []
notes = ""

[cr_701_10d]
rule = "701.10d"
text = "To double a player's life total, the player gains or loses an amount of life such that their new life total is twice its current value."
status = "implemented"
impl_files = ["game/effects/double.rs:12", "game/effects/double.rs:104", "game/effects/double.rs:124", "game/effects/double.rs:133", "game/effects/double.rs:399", "parser/oracle_effect/counter.rs:218", "types/ability.rs:368", "types/ability.rs:377", "types/ability.rs:2169"]
test_files = []
notes = ""

[cr_701_10e]
rule = "701.10e"
text = "To double the number of a kind of counters on a player or permanent, give that player or permanent as many of those counters as that player or permanent already has."
status = "implemented"
impl_files = ["game/effects/double.rs:38", "game/effects/double.rs:56", "game/effects/double.rs:65", "game/effects/double.rs:74", "game/effects/double.rs:327", "game/effects/double.rs:365", "parser/oracle_effect/counter.rs:157", "parser/oracle_effect/counter.rs:195", "types/ability.rs:374"]
test_files = []
notes = ""

[cr_701_10f]
rule = "701.10f"
text = "To double the amount of a type of mana in a player's mana pool, that player adds an amount of mana of that type equal to the amount they already have."
status = "implemented"
impl_files = ["game/effects/double.rs:150", "game/effects/double.rs:189", "game/effects/double.rs:429", "parser/oracle_effect/counter.rs:235", "types/ability.rs:379"]
test_files = []
notes = ""

[cr_701_10g]
rule = "701.10g"
text = "To double an amount of damage a source would deal, that source instead deals twice that much damage. This is a replacement effect."
status = "missing"
impl_files = []
test_files = []
notes = "Damage-doubling replacement effect is not implemented."

[cr_701_11]
rule = "701.11"
text = "Triple"
status = "missing"
impl_files = []
test_files = []
notes = "Triple (power/toughness tripling) is not implemented. No cards with this effect are commonly supported."

[cr_701_11a]
rule = "701.11a"
text = "Tripling a creature's power and/or toughness creates a continuous effect. This effect modifies that creature's power and/or toughness but doesn't set those characteristics to a specific value. See rule 613.4c."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_11b]
rule = "701.11b"
text = "To triple a creature's power, that creature gets +X/+0, where X is twice that creature's power as the spell or ability that triples its power resolves. Similarly, an effect that triples a creature's toughness gives it +0/+X, where X is twice that creature's toughness. Tripling a creature's power and toughness gives it +X/+Y, where X is twice its power and Y is twice its toughness."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_11c]
rule = "701.11c"
text = "If a creature's power is less than 0 when it's tripled, tripling that creature's power instead means that the creature gets -X/-0, where X is twice the difference between 0 and its power. Similarly, if its toughness is less than 0 when tripled, it gets -0/-X. If one characteristic's value is negative but the other isn't when both are tripled, it gets -X/+Y or +X/-Y, as appropriate."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_12]
rule = "701.12"
text = "Exchange"
status = "implemented"
impl_files = ["game/effects/exchange_control.rs"]
test_files = []
notes = ""

[cr_701_12a]
rule = "701.12a"
text = "A spell or ability may instruct players to exchange something (for example, life totals or control of two permanents) as part of its resolution. When such a spell or ability resolves, if the entire exchange can't be completed, no part of the exchange occurs."
status = "implemented"
impl_files = ["game/effects/exchange_control.rs:9", "game/effects/exchange_control.rs:34", "game/effects/exchange_control.rs:45", "game/effects/exchange_control.rs:80", "game/effects/exchange_control.rs:211", "parser/oracle_effect/imperative.rs:1392", "parser/oracle_effect/imperative.rs:1631", "parser/oracle_effect/types.rs:181", "types/ability.rs:2143"]
test_files = []
notes = ""

[cr_701_12b]
rule = "701.12b"
text = "When control of two permanents is exchanged, if those permanents are controlled by different players, each of those players simultaneously gains control of the permanent that was controlled by the other player. If, on the other hand, those permanents are controlled by the same player, the exchange effect does nothing."
status = "implemented"
impl_files = ["game/effects/exchange_control.rs:13", "game/effects/exchange_control.rs:71", "game/effects/exchange_control.rs:192", "types/ability.rs:2145"]
test_files = []
notes = ""

[cr_701_12c]
rule = "701.12c"
text = "When life totals are exchanged, each player gains or loses the amount of life necessary to equal the other player's previous life total. Replacement effects may modify these gains and losses, and triggered abilities may trigger on them. A player who can't gain life can't be given a higher life total this way, and a player who can't lose life can't be given a lower life total this way (see rules 119.7–8)."
status = "missing"
impl_files = []
test_files = []
notes = "Life total exchange is not implemented. exchange_control.rs handles control exchange only."

[cr_701_12d]
rule = "701.12d"
text = "Some spells or abilities may instruct a player to exchange cards in one zone with cards in a different zone (for example, exiled cards and cards in a player's hand). These spells and abilities work the same as other \"exchange\" spells and abilities, except they can exchange the cards only if all the cards are owned by the same player, and they can exchange the cards even if one zone is empty."
status = "missing"
impl_files = []
test_files = []
notes = "Zone-to-zone card exchange not implemented."

[cr_701_12e]
rule = "701.12e"
text = "If a card in one zone is exchanged with a card in a different zone, and either of them is attached to an object, that card stops being attached to that object and the other card becomes attached to that object."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_12f]
rule = "701.12f"
text = "If a spell or ability instructs a player to simply exchange two zones, and one of the zones is empty, the cards in the zones are still exchanged."
status = "missing"
impl_files = []
test_files = []
notes = ""

[cr_701_12g]
rule = "701.12g"
text = "A spell or ability may instruct a player to exchange two numerical values. In such an exchange, each value becomes equal to the previous value of the other. If either of those values is a life total, the affected player gains or loses the amount of life necessary to equal the other value. Replacement effects may modify this gain or loss, and triggered abilities may trigger on it. A player who can't gain life can't be given a higher life total this way, and a player who can't lose life can't be given a lower life total this way (see rules 119.7–8). If either of those values is a power or toughness, a continuous effect is created setting that power or toughness to the other value (see rule 613.4b). This rule does not apply to spells and abilities that switch a creature's power and toughness."
status = "missing"
impl_files = []
test_files = []
notes = "Numerical value exchange (life total swap, power/toughness swap) not implemented."

[cr_701_12h]
rule = "701.12h"
text = "One card (Exchange of Words) instructs a player to exchange the text boxes of two creatures. This creates a text-changing effect (see rule 612, \"Text-Changing Effects\"). In such an exchange, the rules text of each permanent becomes the previous rules text of the other."
status = "missing"
impl_files = []
test_files = []
notes = "Text box exchange (Exchange of Words) not implemented."

[cr_701_13]
rule = "701.13"
text = "Exile"
status = "implemented"
impl_files = ["game/effects/change_zone.rs"]
test_files = []
notes = "Exile is implemented as a ChangeZone effect targeting Zone::Exile."

[cr_701_13a]
rule = "701.13a"
