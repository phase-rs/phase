[cr_701_14c]
rule = "701.14c"
text = "If a creature fights itself, it deals damage to itself equal to twice its power."
status = "missing"
impl_files = []
test_files = []
notes = "Self-fight edge case not specifically handled. The fight resolver reads separate source and target IDs; if they are the same object damage would be applied once from each direction but the second apply_damage_to_target call after the first could result in the object already being gone."

[cr_701_14d]
rule = "701.14d"
text = "The damage dealt when a creature fights isn't combat damage."
status = "implemented"
impl_files = ["game/effects/fight.rs:84"]
test_files = []
notes = "fight.rs passes is_combat_damage: false to apply_damage_to_target, consistent with CR 701.14d."

